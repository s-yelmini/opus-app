<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23121319'/><path d='M19 4L9 18h8l-4 10 14-16h-9z' fill='%235e6ad2'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Opus v2 design tokens */
  --bg:           #ffffff;
  --bg-elev:      #ffffff;
  --bg-sunken:    #f6f6f7;
  --bg-hover:     #f1f1f3;
  --bg-active:    #e8e8ec;

  --line:         #e6e6ea;
  --line-strong:  #d4d4da;

  --ink:          #0e0e12;
  --ink-2:        #3d3d45;
  --ink-3:        #6e6e78;
  --ink-4:        #9e9ea8;

  --accent:       oklch(0.42 0.10 270);
  --accent-ink:   oklch(0.32 0.12 270);
  --accent-soft:  oklch(0.97 0.012 270);
  --accent-line:  oklch(0.92 0.025 270);

  --urgent:       oklch(0.55 0.18 25);
  --high:         oklch(0.45 0.02 280);
  --medium:       oklch(0.65 0.01 280);
  --low:          oklch(0.82 0.01 280);

  --shadow-sm:    0 1px 0 rgba(20,20,30,.03);
  --shadow:       0 1px 2px rgba(20,20,30,.06);
  --shadow-lg:    0 8px 28px rgba(20,20,30,.10), 0 1px 3px rgba(20,20,30,.06);

  --radius-sm:  3px;
  --radius:     4px;
  --radius-md:  6px;
  --radius-lg:  8px;
  --radius-xl:  10px;

  /* Backward-compat aliases */
  --surface:        var(--bg-elev);
  --surface2:       var(--bg-sunken);
  --surface3:       var(--bg-hover);
  --surface4:       var(--bg-active);
  --border:         var(--line);
  --border2:        var(--line-strong);
  --text:           var(--ink);
  --text-2:         var(--ink-2);
  --text-3:         var(--ink-3);
  --accent-hover:   var(--accent-ink);
  --accent-border:  var(--accent-line);
  --accent-glow:    0 0 0 3px var(--accent-soft);
  --red:            var(--urgent);
  --red-bg:         color-mix(in oklch, var(--urgent) 8%, white);
  --orange:         oklch(0.62 0.10 60);
  --yellow:         oklch(0.68 0.08 80);
  --green:          var(--accent);
  --green-soft:     var(--accent-soft);
  --today-glow:     var(--accent-soft);
}

body {
  font-family: 'Inter Tight', ui-sans-serif, -apple-system, sans-serif;
  font-size: 13.5px;
  line-height: 1.45;
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  display: flex;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}
button { font-family: inherit; font-size: inherit; color: inherit; }
input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
::selection { background: var(--accent-soft); color: var(--accent-ink); }
/* Utility */
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "zero","ss01"; }
.kbd { display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-3);background:var(--bg-elev);border:1px solid var(--line);border-bottom-width:1.5px;border-radius:4px; }
.dot { width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; height: 100vh;
  background: var(--bg); border-right: 1px solid var(--line);
  display: flex; flex-direction: column; flex-shrink: 0;
  padding: 10px 8px 12px;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 8px 14px;
}
.workspace-icon {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent); flex-shrink: 0;
  display: grid; place-items: center;
}
.workspace-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
.sidebar-search {
  display: flex; align-items: center; gap: 8px;
  height: 30px; padding: 0 9px; margin-bottom: 12px;
  background: var(--bg-sunken); border-radius: var(--radius);
  color: var(--ink-3); font-size: 12.5px; cursor: pointer; border: none; width: 100%;
  transition: background 100ms;
}
.sidebar-search:hover { background: var(--bg-hover); }
.sidebar-nav { display: flex; flex-direction: column; gap: 1px; }
.sidebar-section-label {
  padding: 6px 8px 4px; font-size: 11px; font-weight: 600;
  color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em;
}
.sidebar-sep { height: 1px; background: var(--line); margin: 14px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  height: 30px; padding: 0 8px; border-radius: var(--radius);
  font-size: 13px; font-weight: 450; color: var(--ink-2);
  cursor: pointer; transition: background 100ms; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active { background: var(--bg-active); color: var(--ink); font-weight: 500; }
.nav-item .nav-icon { color: var(--ink-3); display: inline-flex; width: 16px; flex-shrink: 0; }
.nav-item.active .nav-icon { color: var(--accent); }
.nav-badge { margin-left: auto; font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
.p-dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
.sidebar-header { display: flex; align-items: center; gap: 9px; padding: 6px 8px 14px; }
.sidebar-nav-wrap { flex: 1; overflow-y: auto; }
.sidebar-quickadd {
  display: flex; align-items: center; gap: 8px;
  height: 32px; padding: 0 10px; margin-bottom: 8px;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); color: var(--ink-2); font-size: 12.5px;
  cursor: pointer; width: 100%; font-family: inherit; transition: background 100ms;
}
.sidebar-quickadd:hover { background: var(--bg-hover); }

/* ── MAIN AREA ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

.topbar {
  height: 49px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 16px; gap: 8px; flex-shrink: 0; background: var(--bg);
}
.topbar-page-title { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; margin-right: 8px; }
.topbar-divider { width: 1px; height: 18px; background: var(--line); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.view-tabs { display: flex; gap: 2px; }
.view-tab { font-size: 12.5px; font-weight: 500; padding: 0 10px; height: 26px; border-radius: var(--radius); border: none; background: none; color: var(--ink-3); cursor: pointer; transition: all 0.1s; display: inline-flex; align-items: center; }
.view-tab:hover { color: var(--ink-2); background: var(--bg-hover); }
.view-tab.active { color: var(--ink); background: var(--bg-active); }

.week-nav { display: flex; align-items: center; gap: 4px; }
.week-nav-btn { width: 26px; height: 26px; border-radius: var(--radius); border: none; background: none; color: var(--ink-2); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: background 100ms; }
.week-nav-btn:hover { background: var(--bg-hover); }
.week-label { font-size: 12px; color: var(--ink-3); min-width: 120px; text-align: center; }
.today-btn { font-size: 12px; height: 26px; padding: 0 9px; border-radius: var(--radius); border: 1px solid var(--line); background: none; color: var(--ink-3); cursor: pointer; transition: background 100ms; font-family: inherit; }
.today-btn:hover { background: var(--bg-hover); color: var(--ink-2); }

.btn-sm {
  font-family: inherit; font-size: 13px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 10px;
  border-radius: var(--radius); border: 1px solid transparent;
  background: transparent; color: var(--ink-2); cursor: pointer; transition: background 100ms;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--bg-hover); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); color: white; }
.btn-bordered { background: var(--bg-elev); border-color: var(--line); color: var(--ink-2); }
.btn-bordered:hover { background: var(--bg-hover); }

/* ── CONTENT ROW (views + detail panel) ── */
.content-row {
  flex: 1; display: flex; overflow: hidden;
}

/* ── WEEK VIEW ── */
.week-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

.week-header {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--line); flex-shrink: 0;
  background: var(--bg);
}

.day-header {
  padding: 10px 12px 8px;
  border-right: 1px solid var(--line);
}
.day-header:last-child { border-right: none; }
.day-header.today { background: var(--accent-soft); }

.day-name { font-size: 10.5px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .07em; }
.day-header.today .day-name { color: var(--accent); }

.day-number-row { display: flex; align-items: baseline; gap: 6px; margin-top: 2px; }

.day-number { font-size: 15px; font-weight: 500; color: var(--ink); letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.day-header.today .day-number { color: var(--accent); }

.day-add-btn {
  width: 18px; height: 18px; border-radius: 3px;
  border: none; background: none; color: var(--text-3);
  cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.1s;
}
.day-header:hover .day-add-btn { opacity: 1; }
.day-add-btn:hover { background: var(--surface3); color: var(--text-2); }

.week-body {
  display: grid; grid-template-columns: repeat(7, 1fr);
  flex: 1; overflow-y: auto; align-items: start;
}

.day-col {
  border-right: 1px solid var(--line);
  min-height: 100%; padding: 6px 6px 60px; min-width: 0;
  display: flex; flex-direction: column; gap: 3px;
}
.day-col:last-child { border-right: none; }
.day-col.today { background: var(--accent-soft); }
.past-overlay { display: none; }
.week-task { position: relative; z-index: 1; }

.week-task {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 7px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: background 80ms;
  border: 1px solid var(--line);
  border-left: 2px solid var(--ink-4);
  background: var(--bg-sunken);
  min-width: 0; overflow: hidden;
}

.week-task:hover { background: var(--bg-hover); }
.week-task.selected { background: var(--accent-soft); border-color: var(--accent-line); }
.week-task.is-done .task-chip-text { text-decoration: line-through; color: var(--ink-3); }

.task-chip-check {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; cursor: pointer;
}
.task-chip-check:hover { border-color: var(--green); }
.task-chip-check.done { background: var(--green); border-color: var(--green); }
.task-chip-check.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.task-chip-prio { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.task-chip-text { flex: 1; font-size: 0.7rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Unscheduled */
.unscheduled-bar {
  border-top: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; max-height: 160px; display: flex; flex-direction: column;
}
.unscheduled-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; flex-shrink: 0;
}
.unsched-toggle { font-size: 0.58rem; color: var(--text-3); transition: transform 0.15s; }
.unsched-toggle.collapsed { transform: rotate(-90deg); }
.unscheduled-title { font-size: 0.7rem; color: var(--text-2); }
.unscheduled-count { font-size: 0.65rem; color: var(--text-3); }

.unscheduled-body { display: flex; flex-direction: column; overflow-y: auto; }
/* unscheduled rows */
.unsched-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.08s;
}
.unsched-row:last-child { border-bottom: none; }
.unsched-row:hover { background: var(--surface2); }
.unsched-row.selected { background: var(--accent-soft); }
.unsched-row-text {
  flex: 1; font-size: 0.75rem; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.unsched-day-picker {
  display: flex; gap: 2px; flex-shrink: 0; align-items: center;
}
.unsched-day-btn {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  color: var(--text-3); cursor: pointer;
  transition: background 0.08s, color 0.08s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.unsched-day-btn:hover { background: var(--surface3); color: var(--text-2); border-color: var(--border2); }
.unsched-day-btn.tod { border-color: var(--accent-border); color: var(--accent); }
.unsched-day-btn.sel { background: var(--accent); border-color: var(--accent); color: white; }
.unsched-day-btn.sel:hover { background: var(--accent-hover); }



.unscheduled-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; cursor: pointer; transition: all 0.1s; animation: rowIn 0.12s ease;
}
.unscheduled-chip:hover { background: var(--surface3); }
.unscheduled-chip.selected { background: var(--accent-soft); border-color: var(--accent-border); }
.unscheduled-chip span { font-size: 0.7rem; color: var(--text-2); max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── LIST VIEW ── */
.list-view { flex: 1; display: none; min-width: 0; overflow: hidden; }
.list-view.visible { display: flex; }

.new-issue-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface); transition: background 0.1s; flex-shrink: 0;
  position: sticky; top: 0; z-index: 2;
}
.new-issue-bar:focus-within { background: var(--surface2); }
.new-issue-icon {
  width: 15px; height: 15px; border: 1.5px dashed var(--border2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 0.7rem; flex-shrink: 0; transition: all 0.1s;
}
.new-issue-bar:focus-within .new-issue-icon { border-color: var(--accent); color: var(--accent); }
#task-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text);
}
#task-input::placeholder { color: var(--text-3); }

.meta-btn {
  display: flex; align-items: center; gap: 5px; padding: 3px 7px;
  border-radius: 4px; border: 1px solid transparent; background: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--text-3);
  cursor: pointer; transition: all 0.1s;
}
.meta-btn:hover { background: var(--surface3); color: var(--text-2); border-color: var(--border); }

.group-header {
  display: flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 16px; cursor: pointer; user-select: none;
  background: var(--bg-sunken); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 5; white-space: nowrap;
}
.group-toggle { color: var(--ink-3); transition: transform 0.15s; font-size: 0.58rem; display: inline-block; }
.group-toggle.collapsed { transform: rotate(-90deg); }
.status-icon { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.status-todo .status-icon { border: 1.5px dashed var(--ink-4); }
.status-done .status-icon { background: var(--accent); }
.group-name { font-size: 12.5px; color: var(--ink); font-weight: 500; }
.group-count { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

.task-row {
  display: grid; grid-template-columns: 20px 64px 10px 1fr auto auto auto;
  align-items: center; gap: 10px;
  padding: 0 16px; height: 34px;
  border-bottom: 1px solid var(--line);
  transition: background 80ms; cursor: pointer;
}
.task-row:hover { background: var(--bg-hover); }
.task-row.selected { background: var(--accent-soft); }

@keyframes rowIn {
  from { opacity: 0; transform: translateX(-4px); }
  to   { opacity: 1; transform: translateX(0); }
}

.row-check { width: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.check-circle {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--border2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.check-circle:hover { border-color: var(--green); }
.check-circle.done { background: var(--green); border-color: var(--green); }
.check-circle.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.row-priority { width: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.priority-icon { width: 9px; height: 9px; border-radius: 2px; }
.row-id { font-size: 0.65rem; color: var(--text-3); width: 54px; flex-shrink: 0; }
.row-text { flex: 1; font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row.is-done .row-text { color: var(--text-3); text-decoration: line-through; }
.row-day-badge {
  font-size: 0.62rem; color: var(--text-3); background: var(--surface3);
  padding: 1px 6px; border-radius: 4px; flex-shrink: 0; margin-left: 8px;
}
.row-day-badge.badge-today { color: var(--accent); background: var(--accent-soft); }
.row-day-badge.badge-tomorrow { color: var(--text-2); }
.row-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.1s; margin-left: 6px; }
.task-row:hover .row-actions { opacity: 1; }
.task-row:hover .row-del-btn { opacity: 1 !important; }
.row-action-btn {
  width: 20px; height: 20px; border-radius: 3px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.row-action-btn:hover { background: var(--surface3); color: var(--red); }
.empty-group { padding: 10px 18px 10px 56px; font-size: 0.73rem; color: var(--text-3); }

/* ── DETAIL PANEL ── */
.detail-panel {
  width: 0; overflow: hidden;
  border-left: 1px solid transparent;
  background: var(--surface);
  display: flex; flex-direction: column;
  transition: width 0.2s cubic-bezier(0.4,0,0.2,1), border-color 0.2s;
  flex-shrink: 0;
}

.detail-panel.open {
  width: 260px;
  border-left-color: var(--border);
}

.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.detail-id { font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.04em; }

.detail-close {
  width: 22px; height: 22px; border-radius: 4px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.detail-close:hover { background: var(--surface3); color: var(--text-2); }

.detail-body { flex: 1; overflow-y: auto; padding: 0; }

/* Detail title */
.detail-title-wrap { padding: 14px 16px; border-bottom: 1px solid var(--border); }

.detail-title {
  width: 100%; background: none; border: none; outline: none;
  font-family: inherit; font-size: 15px; font-weight: 500;
  color: var(--ink); line-height: 1.4; resize: none;
  border-radius: 4px; padding: 4px 6px; margin: -4px -6px;
  transition: background 0.1s;
}
.detail-title:hover { background: var(--surface2); }
.detail-title:focus { background: var(--surface2); }

/* Detail fields */
.detail-field {
  display: flex; align-items: flex-start; gap: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.detail-field:hover { background: var(--surface2); }

.detail-field-label {
  font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.04em;
  width: 72px; flex-shrink: 0; padding-top: 3px; text-transform: uppercase;
}

.detail-field-value { flex: 1; }

/* Status toggle */
.status-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 6px; border-radius: 4px; cursor: pointer;
  border: none; background: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  color: var(--text-2); transition: background 0.1s; width: 100%; text-align: left;
}
.status-toggle:hover { background: var(--surface3); }

.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-todo-dot { border: 2px solid var(--text-3); }
.status-done-dot { background: var(--green); }

/* Priority select */
.prio-select-row { display: flex; gap: 4px; }
.prio-mini-btn {
  flex: 1; padding: 4px 3px; border-radius: 4px;
  border: 1px solid var(--border); background: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  color: var(--text-3); cursor: pointer; transition: all 0.1s; text-align: center;
}
.prio-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.prio-mini-btn.active[data-p="p1"] { color: var(--red); background: rgba(229,72,77,0.1); border-color: var(--red); }
.prio-mini-btn.active[data-p="p2"] { color: var(--orange); background: rgba(247,107,21,0.1); border-color: var(--orange); }
.prio-mini-btn.active[data-p="p3"] { color: var(--yellow); background: rgba(245,166,35,0.1); border-color: var(--yellow); }
.prio-mini-btn.active[data-p="p4"] { color: var(--text-2); background: var(--surface3); border-color: var(--border2); }

/* Date field */
.date-field-wrap { display: flex; flex-direction: column; gap: 8px; }

.date-input-wrap { position: relative; }

.date-native {
  width: 100%; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 4px; outline: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.73rem; color: var(--text);
  padding: 6px 8px; cursor: pointer;
  color-scheme: light;
}
.date-native:focus { border-color: var(--accent); }

.date-clear {
  width: 100%; background: none; border: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  color: var(--text-3); cursor: pointer; text-align: left;
  padding: 2px 2px; transition: color 0.1s;
}
.date-clear:hover { color: var(--red); }

/* Mini week picker in panel */
.week-mini-nav { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.week-mini-btn {
  width: 18px; height: 18px; border-radius: 3px; border: none; background: none;
  color: var(--text-3); font-size: 0.65rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.week-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.week-mini-label { font-size: 0.62rem; color: var(--text-3); flex: 1; text-align: center; }

.week-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day-mini-btn {
  padding: 4px 2px; border-radius: 3px; border: 1px solid transparent;
  background: none; font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; color: var(--text-3); cursor: pointer;
  transition: all 0.1s; text-align: center; line-height: 1.4;
}
.day-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.day-mini-btn.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.day-mini-btn.today-d { border-color: var(--accent-border); color: var(--accent); }

/* Detail footer */
.detail-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.delete-btn {
  width: 100%; padding: 6px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.delete-btn:hover { background: rgba(229,72,77,0.1); border-color: var(--red); color: var(--red); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(20,20,30,.32);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh;
  z-index: 100; backdrop-filter: blur(2px); animation: fadeIn 0.14s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 20px 22px; width: 420px;
  box-shadow: var(--shadow-lg); animation: modalIn 0.16s ease; overflow: hidden;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.96); }
  to   { opacity: 1; transform: scale(1); }
}
.modal-title { font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }
.modal-input {
  width: 100%; background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius); outline: none;
  font-family: inherit; font-size: 13px; color: var(--ink);
  padding: 8px 10px; margin-bottom: 12px; height: 34px;
  transition: border-color 120ms, box-shadow 120ms;
}
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.modal-input::placeholder { color: var(--ink-4); }
.modal-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
.modal-label { font-size: 12px; font-weight: 500; color: var(--ink-2); width: 56px; padding-top: 6px; flex-shrink: 0; }
.day-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; flex: 1; }
.day-pick-btn {
  padding: 6px 3px; border-radius: var(--radius); border: 1px solid var(--line);
  background: none; font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; color: var(--ink-3); cursor: pointer; transition: all 0.1s; text-align: center; line-height: 1.4;
}
.day-pick-btn:hover { background: var(--bg-hover); color: var(--ink-2); }
.day-pick-btn.selected { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent-ink); font-weight: 500; }
.day-pick-btn.today-pick { border-color: var(--accent-line); color: var(--accent); }
.day-pick-btn.none-pick.selected { background: var(--bg-hover); border-color: var(--line-strong); color: var(--ink-2); }
.prio-picker { display: flex; gap: 4px; flex: 1; }
.prio-pick-btn {
  flex: 1; padding: 6px 4px; border-radius: var(--radius); border: 1px solid var(--line);
  background: none; font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem; color: var(--ink-3); cursor: pointer; transition: all 0.1s; text-align: center;
}
.prio-pick-btn:hover { background: var(--bg-hover); color: var(--ink-2); }
.prio-pick-btn.selected { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent-ink); }
.modal-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }
.modal-cancel {
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 0 12px; height: 30px; border-radius: var(--radius); border: 1px solid transparent;
  background: none; color: var(--ink-2); cursor: pointer; transition: background 120ms;
}
.modal-cancel:hover { background: var(--bg-hover); }
.modal-save {
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 0 14px; height: 30px; border-radius: var(--radius);
  border: 1px solid var(--accent); background: var(--accent);
  color: white; cursor: pointer; transition: background 120ms;
}
.modal-save:hover { background: var(--accent-ink); }


/* ── HABITS VIEW ── */
.habit-matrix {
  width: 100%; border-collapse: collapse; table-layout: fixed;
}

.habit-matrix th {
  font-size: 10.5px; color: var(--ink-4); letter-spacing: .06em;
  font-weight: 600; text-transform: uppercase;
  padding: 10px 6px; text-align: center;
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
}
.habit-matrix th.today-col { color: var(--accent); }

.habit-name-col {
  width: 200px; min-width: 160px; padding: 0 !important;
  position: sticky; left: 0; background: var(--bg); z-index: 2;
  text-align: left;
}

.habit-row { border-bottom: 1px solid var(--line); }
.habit-row:hover { background: var(--bg-hover); }
.habit-row:hover .habit-name-col-inner { background: var(--bg-hover); }

.habit-name-col-inner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: var(--bg);
  transition: background 80ms;
}

.habit-name-text {
  font-size: 13px; color: var(--ink); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 450;
}

.habit-actions-cell { opacity: 0; transition: opacity 100ms; display: flex; gap: 2px; align-items: center; }
.habit-row:hover .habit-actions-cell { opacity: 1; }

.habit-cell {
  text-align: center; padding: 5px 4px; vertical-align: middle;
}

/* Round habit check — click target around SVG */
.habit-check {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 80ms; background: none;
  border: none; padding: 0; margin: 0 auto;
}
.habit-check:hover { background: var(--bg-active); }
.habit-check.future { opacity: 0.2; cursor: default; pointer-events: none; }

/* stats cols */
.stat-col {
  min-width: 52px; padding: 10px 8px;
  text-align: center; vertical-align: middle;
  border-left: 1px solid var(--border);
}

.stat-streak { font-size: 0.78rem; color: var(--text); font-weight: 500; }
.stat-streak-label { font-size: 0.58rem; color: var(--text-3); }
.stat-pct { font-size: 0.78rem; font-weight: 500; }

/* add habit row */
.habit-add-row td { padding: 8px 16px; }
.habit-add-btn {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; padding: 4px 0; transition: color 0.1s;
}
.habit-add-btn:hover { color: var(--text-2); }

/* month grid */
.month-grid-wrap { padding: 20px; }
.month-habit-block { margin-bottom: 24px; }
.month-habit-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.month-habit-name { font-size: 0.75rem; color: var(--text); }
.month-habit-stats { font-size: 0.68rem; color: var(--text-3); margin-left: auto; }

.month-grid {
  display: flex; flex-wrap: wrap; gap: 3px;
}

.month-cell {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s; font-size: 0.55rem;
  color: var(--text-3); position: relative;
}

.month-cell:hover { border-color: var(--text-3); }
.month-cell.checked { border-color: transparent; color: white; font-size: 0.6rem; }
.month-cell.today-m { border-color: var(--accent); color: var(--accent); }
.month-cell.today-m.checked { border-color: transparent; color: white; }
.month-cell.future-m { opacity: 0.2; cursor: default; pointer-events: none; }

.month-divider { width: 100%; height: 1px; background: var(--border); margin: 4px 0; }

/* ── TRIAGE VIEW ── */
.triage-view {
  flex: 1; display: flex; flex-direction: column;
  align-items: stretch; justify-content: flex-start;
  overflow-y: auto;
}

.triage-empty {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding-top: 80px; color: var(--text-3);
}

.triage-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  transition: background 0.08s;
  animation: rowIn 0.14s ease;
}

.triage-row:first-child { border-radius: 8px 8px 0 0; border-top: 1px solid var(--border2); border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); }
.triage-row:last-child  { border-radius: 0 0 8px 8px; border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); border-bottom: 1px solid var(--border2); }
.triage-row:only-child  { border-radius: 8px; border: 1px solid var(--border2); }
.triage-row:hover { background: var(--surface2); }

.triage-row-prio { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

.triage-row-text {
  flex: 1; font-size: 0.8rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.triage-row-actions { display: flex; gap: 5px; flex-shrink: 0; }

.triage-row-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.1s;
}

.triage-row-btn.skip {
  background: none; border: 1px solid var(--border2); color: var(--text-3);
}
.triage-row-btn.skip:hover { background: rgba(229,72,77,0.08); border-color: var(--red); color: var(--red); }

.triage-row-btn.accept {
  background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--accent);
}
.triage-row-btn.accept:hover { background: var(--accent); color: white; border-color: var(--accent); }

.triage-empty-icon { font-size: 1.8rem; opacity: 0.4; }
.triage-empty-text { font-size: 0.78rem; letter-spacing: 0.02em; }

.triage-progress {
  width: 100%; max-width: 540px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
}

.triage-progress-bar {
  flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden;
}

.triage-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.3s ease;
}

.triage-counter {
  font-size: 0.68rem; color: var(--text-3); white-space: nowrap;
}

.triage-card {
  width: 100%; max-width: 540px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-xl); overflow: hidden;
  animation: triageIn 0.2s cubic-bezier(0.4,0,0.2,1);
}

@keyframes triageIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes triageOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-10px) scale(0.97); }
}

.triage-card.exiting {
  animation: triageOut 0.15s ease forwards;
}

.triage-card-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.triage-card-id {
  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.triage-card-title {
  font-size: 1rem; color: var(--text); font-weight: 400;
  line-height: 1.4; letter-spacing: -0.01em;
}

.triage-card-body {
  padding: 14px 20px; display: flex; flex-direction: column; gap: 14px;
}

.triage-field-row {
  display: flex; align-items: center; gap: 10px;
}

.triage-field-label {
  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em;
  text-transform: uppercase; width: 60px; flex-shrink: 0;
}

/* Priority picker inline */
.triage-prio-btns { display: flex; gap: 4px; }

.triage-prio-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}

.triage-prio-btn:hover { background: var(--surface3); color: var(--text-2); }
.triage-prio-btn.active[data-p="p1"] { background: rgba(229,72,77,0.12); border-color: var(--red); color: var(--red); }
.triage-prio-btn.active[data-p="p2"] { background: rgba(247,107,21,0.12); border-color: var(--orange); color: var(--orange); }
.triage-prio-btn.active[data-p="p3"] { background: rgba(245,166,35,0.12); border-color: var(--yellow); color: var(--yellow); }
.triage-prio-btn.active[data-p="p4"] { background: var(--surface3); border-color: var(--border2); color: var(--text-2); }

/* Day picker inline */
.triage-day-btns {
  display: flex; gap: 3px; flex-wrap: wrap;
}

.triage-day-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.62rem;
  padding: 4px 8px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
  line-height: 1.3; text-align: center;
}

.triage-day-btn:hover { background: var(--surface3); color: var(--text-2); }
.triage-day-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.triage-day-btn.today-d { border-color: var(--accent-border); color: var(--accent); }
.triage-day-btn.none-d { color: var(--text-3); }
.triage-day-btn.none-d.active { background: var(--surface3); border-color: var(--border2); color: var(--text-2); }

/* Action buttons */
.triage-actions {
  display: flex; gap: 8px; padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.triage-action {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  padding: 8px 16px; border-radius: var(--radius);
  border: 1px solid var(--border2); cursor: pointer;
  transition: all 0.12s; flex: 1; text-align: center;
}

.triage-action.accept {
  background: var(--accent); border-color: var(--accent); color: white; font-weight: 500;
}

.triage-action.accept:hover { background: var(--accent-hover); }

.triage-action.skip {
  background: none; color: var(--text-3);
}

.triage-action.skip:hover { background: var(--surface3); color: var(--text-2); }

.triage-action.discard {
  background: none; color: var(--text-3); flex: 0; padding: 8px 12px;
}

.triage-action.discard:hover { background: rgba(229,72,77,0.1); color: var(--red); border-color: var(--red); }

/* Skip stack hint */
.triage-skipped {
  width: 100%; max-width: 540px; margin-top: 12px;
  font-size: 0.68rem; color: var(--text-3); text-align: center;
}

/* triage dot */
.triage-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); display: inline-block;
  margin-left: 4px; vertical-align: middle;
  opacity: 0; transition: opacity 0.2s;
}
.triage-dot.visible { opacity: 1; }

/* sidebar collapse */
.sidebar { transition: width 0.2s cubic-bezier(0.4,0,0.2,1); }
.sidebar.collapsed { width: 40px; }
.sidebar.collapsed .sidebar-nav,
.sidebar.collapsed .workspace-name { display: none; }
.sidebar.collapsed .workspace-icon { margin: 0 auto; }
.sidebar-header { cursor: pointer; user-select: none; }

/* cmd-k palette */
.palette-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 300; display: flex; align-items: flex-start;
  justify-content: center; padding-top: 18vh;
  backdrop-filter: blur(2px); animation: fadeIn 0.1s ease;
}
.palette {
  width: 520px;
  background: rgba(31,31,38,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), var(--accent-glow);
  animation: modalIn 0.15s ease;
}
.palette-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.palette-icon { font-size: 0.8rem; color: var(--text-3); flex-shrink: 0; }
#palette-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  color: var(--text); letter-spacing: 0.01em;
}
#palette-input::placeholder { color: var(--text-3); }
.palette-results { max-height: 320px; overflow-y: auto; }
.palette-section-label {
  font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.08em;
  text-transform: uppercase; padding: 8px 16px 4px;
}
.palette-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; transition: background 0.08s;
}
.palette-item:hover, .palette-item.active { background: var(--surface3); }
.palette-item-icon { font-size: 0.75rem; color: var(--text-3); width: 16px; text-align: center; flex-shrink: 0; }
.palette-item-text { flex: 1; font-size: 0.78rem; color: var(--text); }
.palette-item-sub { font-size: 0.65rem; color: var(--text-3); }
.palette-item-kbd {
  font-size: 0.6rem; color: var(--text-3); background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 3px; padding: 1px 5px;
}
.palette-empty { padding: 20px 16px; font-size: 0.75rem; color: var(--text-3); text-align: center; }


/* ── MILESTONES VIEW ── */
.milestone-list { width: 100%; display: flex; flex-direction: column; }

/* Grid: [48px #/chevron] [10px dot] [1fr name] [220px progress] [72px tasks] [100px due] [44px actions] */
.ms-grid {
  display: grid;
  grid-template-columns: 48px 10px 1fr 220px 72px 100px 44px;
  gap: 16px; align-items: center; padding: 0 20px;
}
.ms-header {
  height: 34px; background: var(--bg-sunken);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 2;
  font-size: 10.5px; font-weight: 600; color: var(--ink-4);
  text-transform: uppercase; letter-spacing: .06em;
}
.ms-row {
  height: 46px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 80ms;
}
.ms-row:hover { background: var(--bg-hover); }
.ms-row:hover .ms-actions { opacity: 1; }

/* Children rows (tasks + sub-milestones) — same grid, sunken bg */
.ms-child-row, .ms-task-row {
  background: var(--bg-sunken);
  border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 80ms;
}
.ms-child-row:hover, .ms-task-row:hover { background: var(--bg-hover); }
.ms-child-row:hover .ms-actions, .ms-task-row:hover .ms-actions { opacity: 1; }
.ms-child-row { height: 38px; }
.ms-task-row  { height: 36px; }
.ms-task-check {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--line-strong); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 120ms; margin: 0 auto;
}
.ms-task-check:hover { border-color: var(--accent); }
.ms-task-check.done { background: var(--accent); border-color: var(--accent); }
.ms-task-check.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.ms-task-prio { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.ms-task-text { flex: 1; font-size: 12.5px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ms-task-text.done { text-decoration: line-through; color: var(--ink-4); }

.ms-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 100ms; justify-content: flex-end; }
.ms-btn {
  width: 22px; height: 22px; display: grid; place-items: center;
  border: none; background: none; color: var(--ink-4); cursor: pointer;
  border-radius: var(--radius-sm); transition: background 80ms, color 80ms;
}
.ms-btn:hover { background: var(--bg-active); color: var(--ink-2); }
.ms-progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 0; }
.ms-progress-bar { flex: 1; height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; min-width: 0; }
.ms-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

.milestone-empty { padding: 60px 20px; text-align: center; font-size: 13px; color: var(--ink-4); }
.milestone-add-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-bottom: 1px solid var(--border); cursor: text;
}
.milestone-add-bar:focus-within { background: var(--surface2); }
.milestone-add-bar input {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 13px; color: var(--text);
}
.milestone-add-bar input::placeholder { color: var(--text-3); }
/* keep old classes as no-ops to avoid JS errors */
.milestone-card {} .milestone-card-header {} .milestone-color-bar {}
.milestone-name {} .milestone-meta {} .milestone-date {} .milestone-count {}
.milestone-progress-wrap {} .milestone-progress-bar {} .milestone-progress-fill {}
.milestone-pct {} .milestone-issues {} .milestone-actions-cell {}
.milestone-action-btn {} .milestone-color-bar {}

/* ── FILTER BAR ── */
.filter-bar {
  height: 38px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 16px; gap: 4px; flex-shrink: 0;
  background: var(--bg);
}

.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; height: 28px; padding: 0 9px;
  border-radius: var(--radius); border: 1px solid var(--line);
  background: var(--bg-elev); color: var(--ink-2);
  cursor: pointer; transition: background 100ms; white-space: nowrap; position: relative;
}
.filter-chip:hover { background: var(--bg-hover); }
.filter-chip.active { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent-ink); }
.filter-chip-caret { opacity: 0.5; font-size: 0.52rem; }

.filter-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-md); min-width: 180px;
  box-shadow: var(--shadow-lg); padding: 4px;
  z-index: 100; overflow: hidden; animation: dropIn 0.12s ease;
}
@keyframes dropIn {
  from { opacity: 0; transform: scale(.96); }
  to   { opacity: 1; transform: scale(1); }
}
.filter-dropdown-label {
  font-size: 11px; font-weight: 600; color: var(--ink-4);
  text-transform: uppercase; letter-spacing: .06em; padding: 6px 9px 4px;
}
.filter-option {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; font-size: 13px; color: var(--ink);
  cursor: pointer; transition: background 80ms; white-space: nowrap;
  border-radius: var(--radius-sm);
}
.filter-option:hover { background: var(--bg-hover); }
.filter-option.selected { color: var(--accent); }
.filter-option-check { margin-left: auto; font-size: 0.62rem; color: var(--accent); }
.filter-option-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.filter-sep { width: 1px; height: 16px; background: var(--line); margin: 0 2px; }

.filter-clear-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.63rem;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; padding: 3px 6px; border-radius: 4px;
  transition: color 0.1s; margin-left: auto;
}
.filter-clear-btn:hover { color: var(--red); }
.saved-view-del {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 0.65rem; padding: 4px 8px; flex-shrink: 0; border-radius: 4px;
}
.saved-view-del:hover { color: var(--red); }

/* JetBrains Mono only for IDs, counts, numeric metadata */
.row-id, .detail-id, .nav-badge,
kbd {
  font-family: 'JetBrains Mono', monospace;
}

/* Focus glow */
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px rgba(94,106,210,0.25);
}

/* ── HABITS YEAR HEATMAP ── */
.year-heatmap-wrap {
  padding: 20px 24px; width: 100%; overflow-x: auto;
}

.year-habit-block {
  margin-bottom: 28px;
}

.year-habit-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}

.year-habit-name {
  font-size: 0.75rem; color: var(--text); font-weight: 500;
}

.year-habit-stats {
  margin-left: auto; display: flex; align-items: center; gap: 12px;
}

.year-stat {
  font-size: 0.65rem; color: var(--text-3); text-align: center;
}

.year-stat-val {
  font-size: 0.8rem; font-weight: 500; color: var(--text-2); display: block;
}

/* Month columns layout */
.year-months-row {
  display: flex; gap: 6px; align-items: flex-start;
}

.year-month-col {
  display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
}

.year-month-label {
  font-size: 0.58rem; color: var(--text-3); letter-spacing: 0.06em;
  text-transform: uppercase; text-align: center; margin-bottom: 4px;
  white-space: nowrap;
}

/* Heatmap cells — week rows inside each month */
.month-heat-grid {
  display: flex; flex-direction: column; gap: 2px;
}

.month-heat-row {
  display: flex; gap: 2px;
}

.heat-cell {
  width: 10px; height: 10px; border-radius: 2px;
  cursor: pointer; transition: all 0.1s; flex-shrink: 0;
}

.heat-cell:hover {
  transform: scale(1.4);
  z-index: 2; position: relative;
}

/* Temperature scale legend */
.heat-legend {
  display: flex; align-items: center; gap: 4px; margin-top: 6px;
}

.heat-legend-label {
  font-size: 0.6rem; color: var(--text-3);
}

.heat-legend-cells {
  display: flex; gap: 2px;
}

/* Year separator */
.year-habit-sep {
  height: 1px; background: var(--border); margin-bottom: 28px;
}

/* ── PLAN VIEW ── */
.plan-issue-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  margin-bottom: 8px; animation: rowIn 0.15s ease;
  transition: border-color 0.1s;
}
.plan-issue-card:hover { border-color: var(--accent-border); }

.plan-issue-title {
  font-size: 0.82rem; color: var(--text); font-weight: 500;
  line-height: 1.4; margin-bottom: 10px;
}

.plan-issue-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}

.plan-meta-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
  border: 1px solid var(--border2); color: var(--text-3); background: none;
  cursor: pointer; transition: all 0.1s; font-family: 'JetBrains Mono', monospace;
}
.plan-meta-chip:hover { background: var(--surface3); color: var(--text-2); }
.plan-meta-chip.active { border-color: var(--accent-border); background: var(--accent-soft); color: var(--accent); }

.plan-issue-reasoning {
  font-size: 0.68rem; color: var(--text-3); font-style: italic;
  line-height: 1.5; margin-bottom: 10px;
}

.plan-issue-actions { display: flex; gap: 6px; }

.plan-accept-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  padding: 5px 14px; border-radius: var(--radius);
  background: var(--accent); border: 1px solid var(--accent);
  color: white; cursor: pointer; transition: all 0.1s;
}
.plan-accept-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: var(--bg); }

.plan-dismiss-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  padding: 5px 12px; border-radius: var(--radius);
  background: none; border: 1px solid var(--border2);
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.plan-dismiss-btn:hover { color: var(--red); border-color: var(--red); }

.plan-accept-all-btn {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  padding: 7px 18px; border-radius: var(--radius);
  background: var(--accent-soft); border: 1px solid var(--accent-border);
  color: var(--accent); cursor: pointer; transition: all 0.1s; margin-bottom: 16px;
}
.plan-accept-all-btn:hover { background: var(--accent); color: white; }

.plan-loading {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.75rem; color: var(--text-3); padding: 20px 0;
}

@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.plan-loading-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.plan-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.plan-loading-dot:nth-child(3) { animation-delay: 0.4s; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: #d8d8df; border-radius: 10px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: #c0c0c8; }
*::-webkit-scrollbar-track { background: transparent; }

/* ── MOOD TRACKER ── */
#mood-view {
  /* Map to global vars */
  --m-bg: var(--bg); --m-surface: var(--bg-elev); --m-surface-2: var(--bg-sunken); --m-surface-3: var(--bg-hover);
  --m-border: var(--line); --m-border-strong: var(--line-strong);
  --m-ink: var(--ink); --m-ink-2: var(--ink-2); --m-ink-3: var(--ink-3); --m-ink-4: var(--ink-4); --m-ink-5: var(--ink-4);
  --m-accent: var(--accent); --m-accent-soft: var(--accent-soft); --m-accent-ink: var(--accent-ink);
  --m-warm: var(--orange); --m-warm-soft: var(--red-bg);
  --m-cool: #5B7FA8; --m-cool-soft: #E4EAF1;
  --m-caution: var(--red); --m-caution-soft: var(--red-bg);
  /* Mood gradient — kept fixed */
  --m-mood-n3: #6B7E91; --m-mood-n2: #8595A6; --m-mood-n1: #A4ADB5;
  --m-mood-0: #B8B5AC; --m-mood-p1: #B8B687; --m-mood-p2: #B0A35F; --m-mood-p3: #98864A;
}
#mood-view .mood-subnav-wrap {
  display: flex; gap: 0; padding: 0 24px; flex-shrink: 0;
  border-bottom: 1px solid var(--m-border); background: var(--m-surface);
}
.mood-subnav-btn {
  font-family: 'Inter Tight', sans-serif; font-size: 0.78rem; font-weight: 500;
  padding: 10px 18px; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
  background: none; color: var(--m-ink-4); cursor: pointer; transition: all 0.12s;
}
.mood-subnav-btn:hover { color: var(--m-ink-2); }
.mood-subnav-btn.active { color: var(--m-accent); border-bottom-color: var(--m-accent); }
.mood-inner { padding: 24px 28px; max-width: 720px; margin: 0 auto; width: 100%; }
.mood-card {
  background: var(--m-surface); border: 1px solid var(--m-border);
  border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(20,20,15,0.04);
}
.mood-section-label {
  font-size: 0.65rem; font-weight: 600; color: var(--m-ink-4);
  text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 14px;
}
.mood-field { margin-bottom: 20px; }
.mood-field:last-child { margin-bottom: 0; }
.mood-field-label { font-size: 0.82rem; font-weight: 500; color: var(--m-ink); margin-bottom: 4px; display: flex; justify-content: space-between; align-items: baseline; }
.mood-field-helper { font-size: 0.72rem; color: var(--m-ink-4); }
.mood-field-sub { font-size: 0.7rem; color: var(--m-ink-4); margin-top: 6px; line-height: 1.5; }
/* Mood dot scale */
.mood-dot-row { display: flex; gap: 8px; align-items: flex-end; padding-bottom: 20px; }
.mood-dot-btn {
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 1.5px solid var(--m-border-strong);
  background: var(--m-surface); transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
}
.mood-dot-btn.active { border-width: 2px; border-color: var(--m-ink); }
.mood-dot-btn .dot-label {
  position: absolute; top: 100%; margin-top: 5px; left: 50%; transform: translateX(-50%);
  font-size: 0.68rem; color: var(--m-ink-4); white-space: nowrap; font-variant-numeric: tabular-nums;
}
.mood-dot-btn.active .dot-label { color: var(--m-ink); font-weight: 500; }
/* 5-point scale */
.mood-5scale { display: flex; gap: 5px; }
.mood-5btn {
  flex: 1; padding: 9px 0; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
  border: 1px solid var(--m-border); background: var(--m-surface); color: var(--m-ink-3);
  font-variant-numeric: tabular-nums; transition: all 0.12s; font-family: inherit;
}
.mood-5btn.active { background: var(--m-accent-soft); border-color: var(--m-accent); color: var(--m-accent-ink); font-weight: 500; }
/* Yes/No */
.mood-yesno { display: inline-flex; overflow: hidden; border: 1px solid var(--m-border); border-radius: 8px; }
.mood-yesno button { padding: 7px 18px; font-size: 0.78rem; border: none; cursor: pointer; font-family: inherit; transition: all 0.12s; background: var(--m-surface); color: var(--m-ink-3); }
.mood-yesno button.active { background: var(--m-accent-soft); color: var(--m-accent-ink); font-weight: 500; }
/* Segment / Caffeine */
.mood-segment { display: inline-flex; padding: 2px; border-radius: 8px; background: var(--m-surface-2); }
.mood-seg-btn { padding: 5px 10px; font-size: 0.75rem; border-radius: 6px; border: 1px solid transparent; cursor: pointer; background: transparent; color: var(--m-ink-3); font-family: inherit; transition: all 0.12s; }
.mood-seg-btn.active { background: var(--m-surface); border-color: var(--m-border); color: var(--m-ink); box-shadow: 0 1px 2px rgba(20,20,15,0.04); }
/* Chip toggles */
.mood-chip { padding: 6px 12px; border-radius: 999px; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--m-border); background: var(--m-surface); color: var(--m-ink-3); }
.mood-chip.active { border-color: var(--m-accent); background: var(--m-accent-soft); color: var(--m-accent-ink); }
.mood-chip-check { width: 14px; height: 14px; border-radius: 50%; border: 1px solid currentColor; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mood-chip.active .mood-chip-check { background: var(--m-accent); border-color: var(--m-accent); }
/* Note */
.mood-note-ta { width: 100%; min-height: 76px; background: var(--m-surface); border: 1px solid var(--m-border); border-radius: 8px; padding: 10px 12px; font-size: 0.82rem; color: var(--m-ink); line-height: 1.55; resize: vertical; outline: none; font-family: inherit; }
.mood-note-ta:focus { border-color: var(--m-accent); }
/* Save */
.mood-save-row { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; padding-bottom: 8px; }
.mood-save-btn { padding: 10px 22px; font-size: 0.82rem; font-weight: 500; border-radius: 8px; background: var(--m-accent); border: none; color: #fff; cursor: pointer; font-family: inherit; transition: opacity 0.12s; }
.mood-save-btn:hover { opacity: 0.88; }
/* Range slider */
.mood-range { width: 100%; accent-color: var(--m-accent); }
/* Pattern alert */
.m-alert { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--m-surface); border: 1px solid var(--m-border); border-left: 3px solid var(--m-warm); border-radius: 8px; margin-bottom: 14px; }
.m-alert-body { font-size: 0.78rem; color: var(--m-ink-2); line-height: 1.55; }
.m-alert-title { color: var(--m-ink); font-weight: 500; }
.m-alert.support { border-left-color: var(--m-cool); }
/* Disclaimer */
.mood-disclaimer { font-size: 0.68rem; color: var(--m-ink-4); line-height: 1.6; padding: 14px 0 20px; border-top: 1px solid var(--m-border); margin-top: 8px; }
/* Done banner */
.mood-done-banner { background: var(--m-accent-soft); border: 1px solid rgba(61,90,76,0.2); border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 0.78rem; color: var(--m-accent-ink); display: flex; align-items: center; gap: 8px; }
/* Trends chart */
.mood-chart-wrap { margin-bottom: 24px; }
.mood-chart-label { font-size: 0.65rem; font-weight: 600; color: var(--m-ink-4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
/* Metric switcher (DashB) */
.mood-metric-card { background: var(--m-surface); border: 1px solid var(--m-border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }
.mood-metric-mini { background: var(--m-surface); border: 1px solid var(--m-border); border-radius: 12px; padding: 12px; cursor: pointer; font-family: inherit; text-align: left; transition: border-color 0.12s; }
.mood-metric-mini:hover { border-color: var(--m-border-strong); }
/* Weekly table */
.mood-week-table { background: var(--m-surface); border: 1px solid var(--m-border); border-radius: 14px; overflow: hidden; }
.mood-week-head { display: grid; grid-template-columns: 1fr 62px 62px 74px 56px 56px 62px; padding: 10px 18px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--m-ink-4); border-bottom: 1px solid var(--m-border); background: var(--m-surface-2); }
.mood-week-row { display: grid; grid-template-columns: 1fr 62px 62px 74px 56px 56px 62px; padding: 14px 18px; align-items: center; border-bottom: 1px solid var(--m-border); font-variant-numeric: tabular-nums; }
.mood-week-row:last-child { border-bottom: none; }
/* AI analysis */
.mood-ai-section { background: var(--m-surface); border: 1px solid var(--m-border); border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; }
.mood-ai-text { font-size: 0.82rem; color: var(--m-ink-2); line-height: 1.8; white-space: pre-wrap; }
/* Serif util — sans only */
.mood-serif { font-family: 'Inter Tight', sans-serif; }

/* ── FONT SYSTEM: force Inter Tight on all UI controls ──────────────
   JetBrains Mono is reserved for: .mono, .kbd, .row-id, .detail-id,
   .nav-badge, .date-native, .day-mini-btn (numeric/tabular data only) */
#task-input,
.meta-btn,
.detail-title,
.status-toggle,
.prio-mini-btn,
.date-clear,
.delete-btn,
.habit-add-btn,
.unsched-day-btn,
.triage-row-btn, .triage-prio-btn, .triage-day-btn, .triage-action,
#palette-input,
.filter-clear-btn, .filter-clear-all,
.plan-meta-chip, .plan-accept-btn, .plan-dismiss-btn, .plan-accept-all-btn,
.modal-cancel, .modal-save,
.milestone-add-bar input,
.ms-add-ms-row input,
.ms-add-task-input {
  font-family: inherit;
}
</style>
</head>

  <!-- Workspace nav -->
  <div class="sidebar-nav-wrap">
