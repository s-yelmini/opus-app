<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23121319'/><path d='M19 4L9 18h8l-4 10 14-16h-9z' fill='%235e6ad2'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opus</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Technical Noir — surfaces */
  --bg:              #121319;
  --surface:         #1b1b22;
  --surface2:        #1f1f26;
  --surface3:        #292930;
  --surface4:        #34343b;

  /* Borders */
  --border:          #454652;
  --border2:         #454652;

  /* Text */
  --text:            #e4e1eb;
  --text-2:          #c6c5d5;
  --text-3:          #908f9e;

  /* Primary accent */
  --accent:          #5e6ad2;
  --accent-hover:    #bdc2ff;
  --accent-soft:     rgba(94,106,210,0.10);
  --accent-border:   rgba(94,106,210,0.35);
  --accent-glow:     0 0 24px rgba(94,106,210,0.15);

  /* Semantic */
  --red:             #ffb4ab;
  --red-bg:          rgba(255,180,171,0.08);
  --orange:          #ffb867;
  --yellow:          #ffb867;
  --green:           #30A46C;
  --green-soft:      rgba(48,164,108,0.12);

  /* Misc */
  --today-glow:      rgba(94,106,210,0.05);

  /* Radii — Soft-Technical */
  --radius-sm:  4px;
  --radius:     6px;
  --radius-lg:  8px;
  --radius-xl:  12px;
}

body {
  font-family: 'Geist', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 196px; height: 100vh;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}

.sidebar-header {
  padding: 18px 14px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px;
}

.workspace-icon {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--accent) 0%, #7C3AED 100%);
  border-radius: 5px; flex-shrink: 0;
}

.workspace-name { font-size: 0.78rem; font-weight: 500; color: var(--text); }

.sidebar-nav { padding: 6px; flex: 1; overflow-y: auto; }
.nav-section { margin-bottom: 14px; }
.nav-label { font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 8px 3px; }

.nav-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px; border-radius: var(--radius);
  font-size: 0.73rem; color: var(--text-2);
  cursor: pointer; transition: all 0.1s;
  border: none; background: none; width: 100%; text-align: left;
}

.nav-item:hover { background: var(--surface3); color: var(--text); }
.nav-item.active { background: var(--surface3); color: var(--text); }
.nav-badge { margin-left: auto; font-size: 0.62rem; color: var(--text-3); }
.p-dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

/* ── MAIN AREA ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

.topbar {
  height: 46px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 18px; gap: 10px; flex-shrink: 0;
}

.view-tabs { display: flex; gap: 2px; }

.view-tab {
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  padding: 4px 10px; border-radius: var(--radius);
  border: none; background: none; color: var(--text-3); cursor: pointer; transition: all 0.1s;
}

.view-tab:hover { color: var(--text-2); background: var(--surface3); }
.view-tab.active { color: var(--text); background: var(--surface3); }
.topbar-page-title { font-size: 0.78rem; font-weight: 500; color: var(--text); letter-spacing: 0.01em; }

.topbar-divider { width: 1px; height: 14px; background: var(--border); }

.week-nav { display: flex; align-items: center; gap: 6px; }
.week-nav-btn {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-2); cursor: pointer; font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.week-nav-btn:hover { background: var(--surface3); color: var(--text); }
.week-label { font-size: 0.72rem; color: var(--text-2); min-width: 130px; text-align: center; }
.today-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.68rem;
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border2);
  background: none; color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.today-btn:hover { background: var(--surface3); color: var(--text-2); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

.btn-sm {
  font-family: 'Geist Mono', monospace; font-size: 0.7rem;
  padding: 4px 9px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text-2); cursor: pointer; transition: all 0.1s;
}
.btn-sm:hover { background: var(--surface3); color: var(--text); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  border-color: var(--accent); color: white;
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: white; }

/* ── CONTENT ROW (views + detail panel) ── */
.content-row {
  flex: 1; display: flex; overflow: hidden;
}

/* ── WEEK VIEW ── */
.week-view {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

.week-header {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  background: var(--surface);
}

.day-header {
  padding: 10px 10px 8px;
  border-right: 1px solid var(--border);
}
.day-header:last-child { border-right: none; }
.day-header.today { background: var(--today-glow); }

.day-name { font-size: 0.6rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.day-header.today .day-name { color: var(--accent); }

.day-number-row { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }

.day-number { font-size: 1.05rem; font-weight: 300; color: var(--text-2); letter-spacing: -0.02em; line-height: 1; }
.day-header.today .day-number {
  color: var(--accent); background: var(--accent-soft);
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; font-weight: 500; flex-shrink: 0;
}

.day-add-btn {
  width: 18px; height: 18px; border-radius: 3px;
  border: none; background: none; color: var(--text-3);
  cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.1s;
}
.day-header:hover .day-add-btn { opacity: 1; }
.day-add-btn:hover { background: var(--surface3); color: var(--text-2); }

.week-body {
  display: grid; grid-template-columns: repeat(7, 1fr);
  flex: 1; overflow-y: auto; align-items: start;
}

.day-col {
  border-right: 1px solid var(--border);
  min-height: 100%; padding: 4px 0; min-width: 0;
}
.day-col:last-child { border-right: none; }
.today-line {
  height: 1px; background: var(--accent); opacity: 0.5;
  margin: 0 4px; border-radius: 1px;
  box-shadow: 0 0 6px rgba(94,106,210,0.4);
}
.past-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.18);
  pointer-events: none; z-index: 0;
}
.week-task { position: relative; z-index: 1; }
.day-col.today { background: var(--today-glow); }

.week-task {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 7px; margin: 1px 3px;
  border-radius: 4px; cursor: pointer;
  transition: background 0.08s; animation: rowIn 0.12s ease;
  border: 1px solid transparent; min-width: 0; overflow: hidden;
}

.week-task:hover { background: var(--surface3); }
.week-task.selected { background: var(--accent-soft); border-color: var(--accent-border); }
.week-task.is-done .task-chip-text { text-decoration: line-through; color: var(--text-3); }

.task-chip-check {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; cursor: pointer;
}
.task-chip-check:hover { border-color: var(--green); }
.task-chip-check.done { background: var(--green); border-color: var(--green); }
.task-chip-check.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.task-chip-prio { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.task-chip-text { flex: 1; font-size: 0.7rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Unscheduled */
.unscheduled-bar {
  border-top: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0; max-height: 160px; display: flex; flex-direction: column;
}
.unscheduled-header {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; flex-shrink: 0;
}
.unsched-toggle { font-size: 0.58rem; color: var(--text-3); transition: transform 0.15s; }
.unsched-toggle.collapsed { transform: rotate(-90deg); }
.unscheduled-title { font-size: 0.7rem; color: var(--text-2); }
.unscheduled-count { font-size: 0.65rem; color: var(--text-3); }

.unscheduled-body { display: flex; flex-direction: column; overflow-y: auto; }
/* unscheduled rows */
.unsched-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.08s;
}
.unsched-row:last-child { border-bottom: none; }
.unsched-row:hover { background: var(--surface2); }
.unsched-row.selected { background: var(--accent-soft); }
.unsched-row-text {
  flex: 1; font-size: 0.75rem; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.unsched-day-picker {
  display: flex; gap: 2px; flex-shrink: 0; align-items: center;
}
.unsched-day-btn {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  font-family: 'Geist Mono', monospace; font-size: 0.62rem;
  color: var(--text-3); cursor: pointer;
  transition: background 0.08s, color 0.08s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.unsched-day-btn:hover { background: var(--surface3); color: var(--text-2); border-color: var(--border2); }
.unsched-day-btn.tod { border-color: var(--accent-border); color: var(--accent); }
.unsched-day-btn.sel { background: var(--accent); border-color: var(--accent); color: white; }
.unsched-day-btn.sel:hover { background: var(--accent-hover); }



.unscheduled-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px; cursor: pointer; transition: all 0.1s; animation: rowIn 0.12s ease;
}
.unscheduled-chip:hover { background: var(--surface3); }
.unscheduled-chip.selected { background: var(--accent-soft); border-color: var(--accent-border); }
.unscheduled-chip span { font-size: 0.7rem; color: var(--text-2); max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── LIST VIEW ── */
.list-view { flex: 1; overflow-y: auto; display: none; min-width: 0; }
.list-view.visible { display: block; }

.new-issue-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface); transition: background 0.1s; flex-shrink: 0;
  position: sticky; top: 0; z-index: 2;
}
.new-issue-bar:focus-within { background: var(--surface2); }
.new-issue-icon {
  width: 15px; height: 15px; border: 1.5px dashed var(--border2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 0.7rem; flex-shrink: 0; transition: all 0.1s;
}
.new-issue-bar:focus-within .new-issue-icon { border-color: var(--accent); color: var(--accent); }
#task-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.78rem; color: var(--text);
}
#task-input::placeholder { color: var(--text-3); }

.meta-btn {
  display: flex; align-items: center; gap: 5px; padding: 3px 7px;
  border-radius: 4px; border: 1px solid transparent; background: none;
  font-family: 'Geist Mono', monospace; font-size: 0.68rem; color: var(--text-3);
  cursor: pointer; transition: all 0.1s;
}
.meta-btn:hover { background: var(--surface3); color: var(--text-2); border-color: var(--border); }

.group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px 5px; cursor: pointer; user-select: none;
}
.group-toggle { color: var(--text-3); transition: transform 0.15s; font-size: 0.58rem; display: inline-block; }
.group-toggle.collapsed { transform: rotate(-90deg); }
.status-icon { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.status-todo .status-icon { border: 2px solid var(--text-3); }
.status-done .status-icon { background: var(--green); }
.group-name { font-size: 0.73rem; color: var(--text-2); font-weight: 500; }
.group-count { font-size: 0.68rem; color: var(--text-3); margin-left: 2px; }

.task-row {
  display: flex; align-items: center; padding: 0 18px; height: 34px;
  border-top: 1px solid transparent; border-bottom: 1px solid transparent;
  transition: background 0.08s; animation: rowIn 0.15s ease; cursor: pointer;
}
.task-row:hover { background: var(--surface2); border-color: var(--border); }
.task-row.selected {
  background: var(--accent-soft);
  border-color: var(--accent-border);
  box-shadow: inset 2px 0 0 var(--accent);
}

@keyframes rowIn {
  from { opacity: 0; transform: translateX(-4px); }
  to   { opacity: 1; transform: translateX(0); }
}

.row-check { width: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.check-circle {
  width: 13px; height: 13px; border-radius: 50%;
  border: 1.5px solid var(--border2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.check-circle:hover { border-color: var(--green); }
.check-circle.done { background: var(--green); border-color: var(--green); }
.check-circle.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.row-priority { width: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.priority-icon { width: 9px; height: 9px; border-radius: 2px; }
.row-id { font-size: 0.65rem; color: var(--text-3); width: 54px; flex-shrink: 0; }
.row-text { flex: 1; font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-row.is-done .row-text { color: var(--text-3); text-decoration: line-through; }
.row-day-badge {
  font-size: 0.62rem; color: var(--text-3); background: var(--surface3);
  padding: 1px 6px; border-radius: 4px; flex-shrink: 0; margin-left: 8px;
}
.row-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.1s; margin-left: 6px; }
.task-row:hover .row-actions { opacity: 1; }
.row-action-btn {
  width: 20px; height: 20px; border-radius: 3px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-size: 0.7rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.row-action-btn:hover { background: var(--surface3); color: var(--red); }
.empty-group { padding: 10px 18px 10px 56px; font-size: 0.73rem; color: var(--text-3); }

/* ── DETAIL PANEL ── */
.detail-panel {
  width: 0; overflow: hidden;
  border-left: 1px solid transparent;
  background: var(--surface);
  display: flex; flex-direction: column;
  transition: width 0.2s cubic-bezier(0.4,0,0.2,1), border-color 0.2s;
  flex-shrink: 0;
}

.detail-panel.open {
  width: 260px;
  border-left-color: var(--border);
}

.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.detail-id { font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.04em; }

.detail-close {
  width: 22px; height: 22px; border-radius: 4px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.detail-close:hover { background: var(--surface3); color: var(--text-2); }

.detail-body { flex: 1; overflow-y: auto; padding: 0; }

/* Detail title */
.detail-title-wrap { padding: 14px 16px; border-bottom: 1px solid var(--border); }

.detail-title {
  width: 100%; background: none; border: none; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.82rem; font-weight: 500;
  color: var(--text); line-height: 1.5; resize: none;
  border-radius: 4px; padding: 4px 6px; margin: -4px -6px;
  transition: background 0.1s;
}
.detail-title:hover { background: var(--surface2); }
.detail-title:focus { background: var(--surface2); }

/* Detail fields */
.detail-field {
  display: flex; align-items: flex-start; gap: 0;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.detail-field:hover { background: var(--surface2); }

.detail-field-label {
  font-size: 0.65rem; color: var(--text-3); letter-spacing: 0.04em;
  width: 72px; flex-shrink: 0; padding-top: 3px; text-transform: uppercase;
}

.detail-field-value { flex: 1; }

/* Status toggle */
.status-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 6px; border-radius: 4px; cursor: pointer;
  border: none; background: none;
  font-family: 'Geist Mono', monospace; font-size: 0.75rem;
  color: var(--text-2); transition: background 0.1s; width: 100%; text-align: left;
}
.status-toggle:hover { background: var(--surface3); }

.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-todo-dot { border: 2px solid var(--text-3); }
.status-done-dot { background: var(--green); }

/* Priority select */
.prio-select-row { display: flex; gap: 4px; }
.prio-mini-btn {
  flex: 1; padding: 4px 3px; border-radius: 4px;
  border: 1px solid var(--border); background: none;
  font-family: 'Geist Mono', monospace; font-size: 0.6rem;
  color: var(--text-3); cursor: pointer; transition: all 0.1s; text-align: center;
}
.prio-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.prio-mini-btn.active[data-p="p1"] { color: var(--red); background: rgba(229,72,77,0.1); border-color: var(--red); }
.prio-mini-btn.active[data-p="p2"] { color: var(--orange); background: rgba(247,107,21,0.1); border-color: var(--orange); }
.prio-mini-btn.active[data-p="p3"] { color: var(--yellow); background: rgba(245,166,35,0.1); border-color: var(--yellow); }
.prio-mini-btn.active[data-p="p4"] { color: var(--text-2); background: var(--surface3); border-color: var(--border2); }

/* Date field */
.date-field-wrap { display: flex; flex-direction: column; gap: 8px; }

.date-input-wrap { position: relative; }

.date-native {
  width: 100%; background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 4px; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.73rem; color: var(--text);
  padding: 6px 8px; cursor: pointer;
  color-scheme: dark;
}
.date-native:focus { border-color: var(--accent); }

.date-clear {
  width: 100%; background: none; border: none;
  font-family: 'Geist Mono', monospace; font-size: 0.68rem;
  color: var(--text-3); cursor: pointer; text-align: left;
  padding: 2px 2px; transition: color 0.1s;
}
.date-clear:hover { color: var(--red); }

/* Mini week picker in panel */
.week-mini-nav { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.week-mini-btn {
  width: 18px; height: 18px; border-radius: 3px; border: none; background: none;
  color: var(--text-3); font-size: 0.65rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.week-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.week-mini-label { font-size: 0.62rem; color: var(--text-3); flex: 1; text-align: center; }

.week-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day-mini-btn {
  padding: 4px 2px; border-radius: 3px; border: 1px solid transparent;
  background: none; font-family: 'Geist Mono', monospace;
  font-size: 0.6rem; color: var(--text-3); cursor: pointer;
  transition: all 0.1s; text-align: center; line-height: 1.4;
}
.day-mini-btn:hover { background: var(--surface3); color: var(--text-2); }
.day-mini-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
.day-mini-btn.today-d { border-color: var(--accent-border); color: var(--accent); }

/* Detail footer */
.detail-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.delete-btn {
  width: 100%; padding: 6px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: none;
  font-family: 'Geist Mono', monospace; font-size: 0.7rem;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.delete-btn:hover { background: rgba(229,72,77,0.1); border-color: var(--red); color: var(--red); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(2px); animation: fadeIn 0.1s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 20px 22px; width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), var(--accent-glow); animation: modalIn 0.15s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.97) translateY(-4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-title { font-size: 0.78rem; color: var(--text-2); margin-bottom: 14px; }
.modal-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.8rem; color: var(--text);
  padding: 9px 12px; margin-bottom: 12px;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text-3); }
.modal-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
.modal-label { font-size: 0.68rem; color: var(--text-3); width: 56px; padding-top: 5px; flex-shrink: 0; }
.day-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; flex: 1; }
.day-pick-btn {
  padding: 5px 3px; border-radius: 4px; border: 1px solid var(--border);
  background: none; font-family: 'Geist Mono', monospace;
  font-size: 0.6rem; color: var(--text-3); cursor: pointer; transition: all 0.1s; text-align: center; line-height: 1.4;
}
.day-pick-btn:hover { background: var(--surface3); color: var(--text-2); }
.day-pick-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
.day-pick-btn.today-pick { border-color: var(--accent-border); color: var(--accent); }
.day-pick-btn.none-pick.selected { background: var(--surface3); border-color: var(--border2); color: var(--text-2); }
.prio-picker { display: flex; gap: 4px; flex: 1; }
.prio-pick-btn {
  flex: 1; padding: 5px 4px; border-radius: 4px; border: 1px solid var(--border);
  background: none; font-family: 'Geist Mono', monospace;
  font-size: 0.62rem; color: var(--text-3); cursor: pointer; transition: all 0.1s; text-align: center;
}
.prio-pick-btn:hover { background: var(--surface3); color: var(--text-2); }
.prio-pick-btn[data-p="p1"].selected { color: var(--red); background: rgba(229,72,77,0.1); border-color: var(--red); }
.prio-pick-btn[data-p="p2"].selected { color: var(--orange); background: rgba(247,107,21,0.1); border-color: var(--orange); }
.prio-pick-btn[data-p="p3"].selected { color: var(--yellow); background: rgba(245,166,35,0.1); border-color: var(--yellow); }
.prio-pick-btn[data-p="p4"].selected { color: var(--text-2); background: var(--surface3); border-color: var(--border2); }
.modal-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 4px; }
.modal-cancel {
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: none; color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.modal-cancel:hover { background: var(--surface3); color: var(--text-2); }
.modal-save {
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  padding: 6px 14px; border-radius: var(--radius);
  border: 1px solid var(--accent); background: var(--accent);
  color: white; cursor: pointer; transition: all 0.1s;
}
.modal-save:hover { background: var(--accent-hover); }


/* ── HABITS VIEW ── */
.habit-matrix {
  width: 100%; border-collapse: collapse;
}

.habit-matrix th {
  font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 400;
  padding: 8px 6px; text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.habit-matrix th.today-col { color: var(--accent); }

.habit-name-col {
  width: 160px; min-width: 160px; padding: 0 !important;
  position: sticky; left: 0; background: var(--bg); z-index: 2;
}

.habit-row { border-bottom: 1px solid var(--border); }
.habit-row:hover { background: var(--surface2); }
.habit-row:hover .habit-name-col-inner { background: var(--surface2); }

.habit-name-col-inner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: var(--bg);
  transition: background 0.08s;
}

.habit-color-bar { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; }

.habit-name-text {
  font-size: 0.75rem; color: var(--text); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.habit-actions-cell { opacity: 0; transition: opacity 0.1s; display: flex; gap: 3px; align-items: center; }
.habit-row:hover .habit-actions-cell { opacity: 1; }

.habit-cell {
  text-align: center; padding: 6px 4px; vertical-align: middle;
}

.habit-check {
  width: 22px; height: 22px; border-radius: 5px;
  border: 1.5px solid var(--border2);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.12s; background: none;
  margin: 0 auto;
}

.habit-check:hover { border-color: var(--text-2); background: var(--surface3); }
.habit-check.checked { border-color: transparent; }
.habit-check.checked::after { content:'✓'; font-size:0.7rem; color:white; font-weight:500; }

.habit-check.future { opacity: 0.25; cursor: default; pointer-events: none; }
.habit-check.today-check { border-color: var(--text-3); }

/* stats cols */
.stat-col {
  min-width: 52px; padding: 10px 8px;
  text-align: center; vertical-align: middle;
  border-left: 1px solid var(--border);
}

.stat-streak { font-size: 0.78rem; color: var(--text); font-weight: 500; }
.stat-streak-label { font-size: 0.58rem; color: var(--text-3); }
.stat-pct { font-size: 0.78rem; font-weight: 500; }

/* add habit row */
.habit-add-row td { padding: 8px 16px; }
.habit-add-btn {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; padding: 4px 0; transition: color 0.1s;
}
.habit-add-btn:hover { color: var(--text-2); }

/* month grid */
.month-grid-wrap { padding: 20px; }
.month-habit-block { margin-bottom: 24px; }
.month-habit-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.month-habit-name { font-size: 0.75rem; color: var(--text); }
.month-habit-stats { font-size: 0.68rem; color: var(--text-3); margin-left: auto; }

.month-grid {
  display: flex; flex-wrap: wrap; gap: 3px;
}

.month-cell {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.1s; font-size: 0.55rem;
  color: var(--text-3); position: relative;
}

.month-cell:hover { border-color: var(--text-3); }
.month-cell.checked { border-color: transparent; color: white; font-size: 0.6rem; }
.month-cell.today-m { border-color: var(--accent); color: var(--accent); }
.month-cell.today-m.checked { border-color: transparent; color: white; }
.month-cell.future-m { opacity: 0.2; cursor: default; pointer-events: none; }

.month-divider { width: 100%; height: 1px; background: var(--border); margin: 4px 0; }

/* ── TRIAGE VIEW ── */
.triage-view {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  overflow-y: auto; padding: 32px 20px 60px;
}

.triage-empty {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; padding-top: 80px; color: var(--text-3);
}

.triage-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  transition: background 0.08s;
  animation: rowIn 0.14s ease;
}

.triage-row:first-child { border-radius: 8px 8px 0 0; border-top: 1px solid var(--border2); border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); }
.triage-row:last-child  { border-radius: 0 0 8px 8px; border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); border-bottom: 1px solid var(--border2); }
.triage-row:only-child  { border-radius: 8px; border: 1px solid var(--border2); }
.triage-row:hover { background: var(--surface2); }

.triage-row-prio { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

.triage-row-text {
  flex: 1; font-size: 0.8rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.triage-row-actions { display: flex; gap: 5px; flex-shrink: 0; }

.triage-row-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.68rem;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.1s;
}

.triage-row-btn.skip {
  background: none; border: 1px solid var(--border2); color: var(--text-3);
}
.triage-row-btn.skip:hover { background: rgba(229,72,77,0.08); border-color: var(--red); color: var(--red); }

.triage-row-btn.accept {
  background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--accent);
}
.triage-row-btn.accept:hover { background: var(--accent); color: white; border-color: var(--accent); }

.triage-empty-icon { font-size: 1.8rem; opacity: 0.4; }
.triage-empty-text { font-size: 0.78rem; letter-spacing: 0.02em; }

.triage-progress {
  width: 100%; max-width: 540px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 28px;
}

.triage-progress-bar {
  flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden;
}

.triage-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.3s ease;
}

.triage-counter {
  font-size: 0.68rem; color: var(--text-3); white-space: nowrap;
}

.triage-card {
  width: 100%; max-width: 540px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-xl); overflow: hidden;
  animation: triageIn 0.2s cubic-bezier(0.4,0,0.2,1);
}

@keyframes triageIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes triageOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-10px) scale(0.97); }
}

.triage-card.exiting {
  animation: triageOut 0.15s ease forwards;
}

.triage-card-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.triage-card-id {
  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.triage-card-title {
  font-size: 1rem; color: var(--text); font-weight: 400;
  line-height: 1.4; letter-spacing: -0.01em;
}

.triage-card-body {
  padding: 14px 20px; display: flex; flex-direction: column; gap: 14px;
}

.triage-field-row {
  display: flex; align-items: center; gap: 10px;
}

.triage-field-label {
  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em;
  text-transform: uppercase; width: 60px; flex-shrink: 0;
}

/* Priority picker inline */
.triage-prio-btns { display: flex; gap: 4px; }

.triage-prio-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.65rem;
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}

.triage-prio-btn:hover { background: var(--surface3); color: var(--text-2); }
.triage-prio-btn.active[data-p="p1"] { background: rgba(229,72,77,0.12); border-color: var(--red); color: var(--red); }
.triage-prio-btn.active[data-p="p2"] { background: rgba(247,107,21,0.12); border-color: var(--orange); color: var(--orange); }
.triage-prio-btn.active[data-p="p3"] { background: rgba(245,166,35,0.12); border-color: var(--yellow); color: var(--yellow); }
.triage-prio-btn.active[data-p="p4"] { background: var(--surface3); border-color: var(--border2); color: var(--text-2); }

/* Day picker inline */
.triage-day-btns {
  display: flex; gap: 3px; flex-wrap: wrap;
}

.triage-day-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.62rem;
  padding: 4px 8px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
  line-height: 1.3; text-align: center;
}

.triage-day-btn:hover { background: var(--surface3); color: var(--text-2); }
.triage-day-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.triage-day-btn.today-d { border-color: var(--accent-border); color: var(--accent); }
.triage-day-btn.none-d { color: var(--text-3); }
.triage-day-btn.none-d.active { background: var(--surface3); border-color: var(--border2); color: var(--text-2); }

/* Action buttons */
.triage-actions {
  display: flex; gap: 8px; padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.triage-action {
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  padding: 8px 16px; border-radius: var(--radius);
  border: 1px solid var(--border2); cursor: pointer;
  transition: all 0.12s; flex: 1; text-align: center;
}

.triage-action.accept {
  background: var(--accent); border-color: var(--accent); color: white; font-weight: 500;
}

.triage-action.accept:hover { background: var(--accent-hover); }

.triage-action.skip {
  background: none; color: var(--text-3);
}

.triage-action.skip:hover { background: var(--surface3); color: var(--text-2); }

.triage-action.discard {
  background: none; color: var(--text-3); flex: 0; padding: 8px 12px;
}

.triage-action.discard:hover { background: rgba(229,72,77,0.1); color: var(--red); border-color: var(--red); }

/* Skip stack hint */
.triage-skipped {
  width: 100%; max-width: 540px; margin-top: 12px;
  font-size: 0.68rem; color: var(--text-3); text-align: center;
}

/* triage dot */
.triage-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); display: inline-block;
  margin-left: 4px; vertical-align: middle;
  opacity: 0; transition: opacity 0.2s;
}
.triage-dot.visible { opacity: 1; }

/* sidebar collapse */
.sidebar { transition: width 0.2s cubic-bezier(0.4,0,0.2,1); }
.sidebar.collapsed { width: 40px; }
.sidebar.collapsed .sidebar-nav,
.sidebar.collapsed .workspace-name { display: none; }
.sidebar.collapsed .workspace-icon { margin: 0 auto; }
.sidebar-header { cursor: pointer; user-select: none; }

/* cmd-k palette */
.palette-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 300; display: flex; align-items: flex-start;
  justify-content: center; padding-top: 18vh;
  backdrop-filter: blur(2px); animation: fadeIn 0.1s ease;
}
.palette {
  width: 520px;
  background: rgba(31,31,38,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), var(--accent-glow);
  animation: modalIn 0.15s ease;
}
.palette-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.palette-icon { font-size: 0.8rem; color: var(--text-3); flex-shrink: 0; }
#palette-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.85rem;
  color: var(--text); letter-spacing: 0.01em;
}
#palette-input::placeholder { color: var(--text-3); }
.palette-results { max-height: 320px; overflow-y: auto; }
.palette-section-label {
  font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.08em;
  text-transform: uppercase; padding: 8px 16px 4px;
}
.palette-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; transition: background 0.08s;
}
.palette-item:hover, .palette-item.active { background: var(--surface3); }
.palette-item-icon { font-size: 0.75rem; color: var(--text-3); width: 16px; text-align: center; flex-shrink: 0; }
.palette-item-text { flex: 1; font-size: 0.78rem; color: var(--text); }
.palette-item-sub { font-size: 0.65rem; color: var(--text-3); }
.palette-item-kbd {
  font-size: 0.6rem; color: var(--text-3); background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 3px; padding: 1px 5px;
}
.palette-empty { padding: 20px 16px; font-size: 0.75rem; color: var(--text-3); text-align: center; }


/* ── MILESTONES VIEW ── */
/* ── MILESTONES — table rows ── */
.milestone-list { width: 100%; display: flex; flex-direction: column; }

/* Table header */
.milestone-table-header {
  display: flex; align-items: center;
  padding: 6px 20px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 2;
}
.ms-col-name    { flex: 1; font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.ms-col-date    { width: 100px; font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.ms-col-count   { width: 70px;  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.ms-col-pct     { width: 80px;  font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; }
.ms-col-actions { width: 48px; }

/* Milestone row */
.milestone-row {
  display: flex; align-items: center;
  padding: 0 20px; height: 40px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.08s;
}
.milestone-row:hover { background: var(--surface2); }
.milestone-row:hover .ms-row-actions { opacity: 1; }

.ms-row-drag {
  color: var(--text-3); font-size: 0.62rem; opacity: 0;
  cursor: grab; user-select: none; margin-right: 6px; flex-shrink: 0;
  transition: opacity 0.1s;
}
.milestone-row:hover .ms-row-drag { opacity: 0.4; }

.ms-row-color { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; margin-right: 10px; }

.ms-row-name { flex: 1; font-size: 0.8rem; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.ms-row-date { width: 100px; font-size: 0.72rem; color: var(--text-3); }
.ms-row-date.overdue { color: var(--red); }
.ms-row-date.soon    { color: var(--yellow); }

.ms-row-count { width: 70px; font-size: 0.72rem; color: var(--text-3); }

.ms-row-pct-wrap { width: 80px; display: flex; align-items: center; gap: 6px; }
.ms-row-pct-bar  { flex: 1; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.ms-row-pct-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.ms-row-pct-num  { font-size: 0.65rem; color: var(--text-3); width: 28px; text-align: right; flex-shrink: 0; }

.ms-row-actions { width: 48px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
.ms-row-btn {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 0.68rem; padding: 3px 5px; border-radius: 3px; transition: color 0.1s;
}
.ms-row-btn:hover { color: var(--text-2); }

/* Detail panel when milestone is clicked — issues slide in below */
.milestone-detail {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  animation: rowIn 0.15s ease;
}

.milestone-issue-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 20px 7px 48px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.08s;
}
.milestone-issue-row:last-child { border-bottom: none; }
.milestone-issue-row:hover { background: var(--surface3); }
.milestone-issue-check {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1.5px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; cursor: pointer;
}
.milestone-issue-check:hover { border-color: var(--green); }
.milestone-issue-check.done { background: var(--green); border-color: var(--green); }
.milestone-issue-check.done::after {
  content: ''; width: 5px; height: 3px;
  border-left: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px); display: block;
}
.milestone-issue-prio { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.milestone-issue-text { flex: 1; font-size: 0.78rem; color: var(--text-2); }
.milestone-issue-text.done-text { text-decoration: line-through; color: var(--text-3); }
.milestone-add-issue {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 20px 7px 48px;
}
.milestone-add-issue input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.75rem; color: var(--text);
}
.milestone-add-issue input::placeholder { color: var(--text-3); }

.milestone-empty { padding: 60px 20px; text-align: center; font-size: 0.75rem; color: var(--text-3); }
.milestone-add-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-bottom: 1px solid var(--border); cursor: text;
}
.milestone-add-bar:focus-within { background: var(--surface2); }
.milestone-add-bar input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Geist Mono', monospace; font-size: 0.78rem; color: var(--text);
}
.milestone-add-bar input::placeholder { color: var(--text-3); }
/* keep old classes as no-ops to avoid JS errors */
.milestone-card {} .milestone-card-header {} .milestone-color-bar {}
.milestone-name {} .milestone-meta {} .milestone-date {} .milestone-count {}
.milestone-progress-wrap {} .milestone-progress-bar {} .milestone-progress-fill {}
.milestone-pct {} .milestone-issues {} .milestone-actions-cell {}
.milestone-action-btn {} .milestone-color-bar {}

/* ── FILTER BAR ── */
.filter-bar {
  height: 38px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 18px; gap: 5px; flex-shrink: 0;
  background: var(--surface);
}

.filter-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Geist Mono', monospace; font-size: 0.67rem;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
  white-space: nowrap; position: relative;
}
.filter-chip:hover { background: var(--surface3); color: var(--text-2); }
.filter-chip.active { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }
.filter-chip-caret { opacity: 0.5; font-size: 0.52rem; }

.filter-dropdown {
  position: absolute; top: calc(100% + 5px); left: 0;
  background: rgba(31,31,38,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg); min-width: 168px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  z-index: 100; overflow: hidden;
  animation: dropIn 0.1s ease;
}
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.filter-dropdown-label {
  font-size: 0.58rem; color: var(--text-3); letter-spacing: 0.08em;
  text-transform: uppercase; padding: 8px 12px 3px;
}
.filter-option {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; font-size: 0.73rem; color: var(--text-2);
  cursor: pointer; transition: background 0.08s; white-space: nowrap;
}
.filter-option:hover { background: var(--surface3); color: var(--text); }
.filter-option.selected { color: var(--accent); }
.filter-option-check { margin-left: auto; font-size: 0.62rem; color: var(--accent); }
.filter-option-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 1px; }

.filter-clear-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.63rem;
  color: var(--text-3); background: none; border: none;
  cursor: pointer; padding: 3px 6px; border-radius: 4px;
  transition: color 0.1s; margin-left: auto;
}
.filter-clear-btn:hover { color: var(--red); }
.saved-view-del {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 0.65rem; padding: 4px 8px; flex-shrink: 0; border-radius: 4px;
}
.saved-view-del:hover { color: var(--red); }

/* Geist Mono for labels, IDs, code, metadata */
.row-id, .detail-id, .nav-badge, .nav-label,
.filter-chip, .filter-dropdown-label,
.btn-sm, .ai-btn, .triage-row-btn,
kbd, .week-label, .topbar-page-title,
#palette-input, .palette-item-kbd,
.task-chip-text, .habit-name-text,
input[type="text"], textarea,
.quick-add-input, .detail-title,
.detail-notes-ta {
  font-family: 'Geist Mono', monospace;
}

/* Focus glow */
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px rgba(94,106,210,0.25);
}

/* ── HABITS YEAR HEATMAP ── */
.year-heatmap-wrap {
  padding: 20px 24px; width: 100%; overflow-x: auto;
}

.year-habit-block {
  margin-bottom: 28px;
}

.year-habit-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}

.year-habit-name {
  font-size: 0.75rem; color: var(--text); font-weight: 500;
}

.year-habit-stats {
  margin-left: auto; display: flex; align-items: center; gap: 12px;
}

.year-stat {
  font-size: 0.65rem; color: var(--text-3); text-align: center;
}

.year-stat-val {
  font-size: 0.8rem; font-weight: 500; color: var(--text-2); display: block;
}

/* Month columns layout */
.year-months-row {
  display: flex; gap: 6px; align-items: flex-start;
}

.year-month-col {
  display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
}

.year-month-label {
  font-size: 0.58rem; color: var(--text-3); letter-spacing: 0.06em;
  text-transform: uppercase; text-align: center; margin-bottom: 4px;
  white-space: nowrap;
}

/* Heatmap cells — week rows inside each month */
.month-heat-grid {
  display: flex; flex-direction: column; gap: 2px;
}

.month-heat-row {
  display: flex; gap: 2px;
}

.heat-cell {
  width: 10px; height: 10px; border-radius: 2px;
  cursor: pointer; transition: all 0.1s; flex-shrink: 0;
}

.heat-cell:hover {
  transform: scale(1.4);
  z-index: 2; position: relative;
}

/* Temperature scale legend */
.heat-legend {
  display: flex; align-items: center; gap: 4px; margin-top: 6px;
}

.heat-legend-label {
  font-size: 0.6rem; color: var(--text-3);
}

.heat-legend-cells {
  display: flex; gap: 2px;
}

/* Year separator */
.year-habit-sep {
  height: 1px; background: var(--border); margin-bottom: 28px;
}

/* ── PLAN VIEW ── */
.plan-issue-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 14px 16px;
  margin-bottom: 8px; animation: rowIn 0.15s ease;
  transition: border-color 0.1s;
}
.plan-issue-card:hover { border-color: var(--accent-border); }

.plan-issue-title {
  font-size: 0.82rem; color: var(--text); font-weight: 500;
  line-height: 1.4; margin-bottom: 10px;
}

.plan-issue-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}

.plan-meta-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
  border: 1px solid var(--border2); color: var(--text-3); background: none;
  cursor: pointer; transition: all 0.1s; font-family: 'Geist Mono', monospace;
}
.plan-meta-chip:hover { background: var(--surface3); color: var(--text-2); }
.plan-meta-chip.active { border-color: var(--accent-border); background: var(--accent-soft); color: var(--accent); }

.plan-issue-reasoning {
  font-size: 0.68rem; color: var(--text-3); font-style: italic;
  line-height: 1.5; margin-bottom: 10px;
}

.plan-issue-actions { display: flex; gap: 6px; }

.plan-accept-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.7rem;
  padding: 5px 14px; border-radius: var(--radius);
  background: var(--accent); border: 1px solid var(--accent);
  color: white; cursor: pointer; transition: all 0.1s;
}
.plan-accept-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: var(--bg); }

.plan-dismiss-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.7rem;
  padding: 5px 12px; border-radius: var(--radius);
  background: none; border: 1px solid var(--border2);
  color: var(--text-3); cursor: pointer; transition: all 0.1s;
}
.plan-dismiss-btn:hover { color: var(--red); border-color: var(--red); }

.plan-accept-all-btn {
  font-family: 'Geist Mono', monospace; font-size: 0.72rem;
  padding: 7px 18px; border-radius: var(--radius);
  background: var(--accent-soft); border: 1px solid var(--accent-border);
  color: var(--accent); cursor: pointer; transition: all 0.1s; margin-bottom: 16px;
}
.plan-accept-all-btn:hover { background: var(--accent); color: white; }

.plan-loading {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.75rem; color: var(--text-3); padding: 20px 0;
}

@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.plan-loading-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}
.plan-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.plan-loading-dot:nth-child(3) { animation-delay: 0.4s; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header" onclick="toggleSidebar()" title="Toggle sidebar (⌘B)">
    <div class="workspace-icon"></div>
    <span class="workspace-name">Opus</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <button class="nav-item" id="nav-triage" onclick="switchView('triage'); setNavActive(this)">
        <span>⊡</span> Triage
        <span class="triage-dot" id="triage-dot-sidebar"></span>
        <span class="nav-badge" id="badge-triage-nav">0</span>
      </button>
      <button class="nav-item" id="nav-list" onclick="switchView('list'); setNavActive(this)">
        <span>≡</span> List
        <span class="nav-badge" id="badge-all">0</span>
      </button>
      <button class="nav-item active" id="nav-week" onclick="switchView('week'); setNavActive(this)">
        <span>◫</span> Week
      </button>
      <button class="nav-item" id="nav-milestones" onclick="switchView('milestones'); setNavActive(this)">
        <span>◈</span> Milestones
        <span class="nav-badge" id="badge-milestones">0</span>
      </button>
    </div>
    <!-- Saved views -->
    <div id="saved-views-list"></div>

    <div style="margin:4px 8px 8px;border-top:1px solid var(--border)"></div>
    <div class="nav-section">
      <button class="nav-item" id="nav-habits" onclick="switchView('habits'); setNavActive(this)">
        <span>◉</span> Habits
      </button>
      <div id="sidebar-habits-widget" style="padding:4px 8px 6px"></div>
    </div>
  </nav>
</div>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <!-- Page title replaces tabs -->
    <span class="topbar-page-title" id="topbar-title">List</span>
    <div class="topbar-divider" id="week-sep" style="display:none"></div>
    <div class="week-nav" id="week-nav" style="display:none">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-label" id="week-label">—</span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <div class="topbar-divider" id="habits-sep" style="display:none"></div>
    <div class="week-nav" id="habits-nav" style="display:none">
      <button class="week-nav-btn" onclick="shiftHabitPeriod(-1)">‹</button>
      <span class="week-label" id="habits-label">—</span>
      <button class="week-nav-btn" onclick="shiftHabitPeriod(1)">›</button>
      <button class="today-btn" onclick="habitGoToday()">Today</button>
      <div style="display:flex;gap:2px;margin-left:6px">
        <button class="view-tab" id="htab-week" onclick="setHabitMode('week')" style="font-size:0.65rem;padding:3px 8px">Week</button>
        <button class="view-tab" id="htab-month" onclick="setHabitMode('month')" style="font-size:0.65rem;padding:3px 8px">Month</button>
        <button class="view-tab" id="htab-year" onclick="setHabitMode('year')" style="font-size:0.65rem;padding:3px 8px">Year</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm" onclick="toggleKbdHelp()" title="Keyboard shortcuts">?</button>
      <button class="btn-sm btn-primary" id="new-issue-btn" onclick="openModal()">New issue</button>
      <button class="btn-sm btn-primary" id="new-habit-btn" style="display:none" onclick="openHabitModal()">New habit</button>
      <button class="btn-sm btn-primary" id="new-milestone-btn" style="display:none" onclick="openMilestoneModal()">New milestone</button>

    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filter-bar" style="display:none">
    <!-- Status -->
    <div style="position:relative">
      <button class="filter-chip" id="filter-status-btn" onclick="toggleFilterDD('status')">
        <span id="filter-status-icon">○</span>
        <span id="filter-status-label">Status</span>
        <span class="filter-chip-caret" id="filter-status-caret">▾</span>
      </button>
      <div class="filter-dropdown" id="filter-status-dd" style="display:none">
        <div class="filter-dropdown-label">Status</div>
        <div class="filter-option" onclick="setViewFilter('status',null,'Status','○')">
          <div class="filter-option-dot" style="border:1.5px solid var(--text-3)"></div>
          All
        </div>
        <div class="filter-option" onclick="setViewFilter('status','todo','Todo','○')">
          <div class="filter-option-dot" style="border:1.5px solid var(--text-3)"></div>
          Todo
        </div>
        <div class="filter-option" onclick="setViewFilter('status','done','Done','✓')">
          <div class="filter-option-dot" style="background:var(--green)"></div>
          Done
        </div>
      </div>
    </div>

    <!-- Milestone -->
    <div style="position:relative">
      <button class="filter-chip" id="filter-milestone-btn" onclick="toggleFilterDD('milestone')">
        <span>◈</span>
        <span id="filter-milestone-label">Milestone</span>
        <span class="filter-chip-caret" id="filter-milestone-caret">▾</span>
      </button>
      <div class="filter-dropdown" id="filter-milestone-dd" style="display:none">
        <div class="filter-dropdown-label">Milestone</div>
        <div class="filter-option" onclick="setViewFilter('milestone',null,'Milestone','◈')" id="filter-ms-none">
          <div class="filter-option-dot" style="border:1.5px solid var(--text-3)"></div>
          All milestones
        </div>
        <div id="filter-milestone-options"></div>
      </div>
    </div>

    <!-- Priority -->
    <div style="position:relative">
      <button class="filter-chip" id="filter-priority-btn" onclick="toggleFilterDD('priority')">
        <span id="filter-priority-icon">◐</span>
        <span id="filter-priority-label">Priority</span>
        <span class="filter-chip-caret" id="filter-priority-caret">▾</span>
      </button>
      <div class="filter-dropdown" id="filter-priority-dd" style="display:none">
        <div class="filter-dropdown-label">Priority</div>
        <div class="filter-option" onclick="setViewFilter('priority',null,'Priority','◐')">
          <div class="filter-option-dot" style="border:1.5px solid var(--text-3)"></div>
          All
        </div>
        <div class="filter-option" onclick="setViewFilter('priority','p1','Urgent','◐')">
          <div class="filter-option-dot" style="background:var(--red)"></div>
          Urgent
        </div>
        <div class="filter-option" onclick="setViewFilter('priority','p2','High','◐')">
          <div class="filter-option-dot" style="background:var(--orange)"></div>
          High
        </div>
        <div class="filter-option" onclick="setViewFilter('priority','p3','Medium','◐')">
          <div class="filter-option-dot" style="background:var(--yellow)"></div>
          Medium
        </div>
        <div class="filter-option" onclick="setViewFilter('priority','p4','Low','◐')">
          <div class="filter-option-dot" style="background:var(--text-3)"></div>
          Low
        </div>
      </div>
    </div>

    <div class="filter-sep"></div>
    <button class="filter-clear-btn" id="filter-clear-btn" style="display:none" onclick="clearViewFilters()">Clear</button>
    <button id="save-view-btn" style="display:none;font-family:'Geist Mono',monospace;font-size:0.63rem;color:var(--text-3);background:none;border:1px solid var(--border2);padding:3px 8px;border-radius:4px;cursor:pointer;margin-left:4px" onclick="promptSaveView()">Save view</button>
  </div>

  <!-- CONTENT ROW -->
  <div class="content-row">

    <!-- WEEK VIEW -->
    <div class="week-view" id="week-view" style="display:none">
      <div class="week-header" id="week-header"></div>
      <div class="week-body" id="week-body"></div>
      <div class="unscheduled-bar">
        <div class="unscheduled-header" onclick="toggleUnsched()">
          <span class="unsched-toggle" id="unsched-toggle">▾</span>
          <span class="unscheduled-title">Unscheduled</span>
          <span class="unscheduled-count" id="unsched-count">0</span>
        </div>
        <div class="unscheduled-body" id="unsched-body"></div>
      </div>
    </div>

    <!-- LIST VIEW -->
    <div class="list-view" id="list-view" style="display:none">
      <div class="new-issue-bar">
        <div class="new-issue-icon">+</div>
        <input type="text" id="task-input" placeholder="Quick add..." autocomplete="off" />
        <button class="meta-btn" onclick="openModal()">+ options</button>
      </div>
      <div id="task-list"></div>

    </div>

    <!-- HABITS VIEW -->
    <div id="habits-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-width:0;overflow-y:auto">
      <div id="habits-content" style="flex:1"></div>
    </div>

    <!-- TRIAGE VIEW -->
    <div id="triage-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-width:0">

      <!-- Quick add bar -->
      <div id="triage-input-bar" style="display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0">
        <div style="width:15px;height:15px;border:1.5px dashed var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:0.7rem;flex-shrink:0;margin-left:18px">+</div>
        <input id="triage-inbox-input" type="text" placeholder="Issue title..." autocomplete="off"
          style="flex:1;background:none;border:none;outline:none;font-family:'Geist Mono',monospace;font-size:0.78rem;color:var(--text);padding:10px 12px;"
          onkeydown="handleTriageInputKey(event)" />
        <button onclick="submitTriageInput()" style="font-family:'Geist Mono',monospace;font-size:0.68rem;padding:5px 12px;background:var(--accent);border:1px solid var(--accent);color:white;border-radius:var(--radius);cursor:pointer;margin-right:6px">Add</button>
        <button id="gen-issues-btn" onclick="toggleGeneratePanel(true)" style="font-family:'Geist Mono',monospace;font-size:0.68rem;padding:5px 14px;margin-right:10px;background:linear-gradient(135deg,var(--accent) 0%,#7c3aed 100%);border:none;color:white;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap">&#10022; Generar issues</button>
      </div>

      <!-- AI Generate panel -->
      <div id="triage-generate-panel" style="display:none;flex-direction:column;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:14px 18px;gap:10px">
        <textarea id="triage-plan-input"
          placeholder="Contame cómo va a ser tu semana — reuniones, proyectos, deadlines, compromisos. Claude los convierte en issues."
          style="width:100%;min-height:110px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);
                 padding:12px 14px;font-family:'Geist Mono',monospace;font-size:0.75rem;color:var(--text);
                 line-height:1.6;resize:none;outline:none;transition:border-color 0.15s;color-scheme:dark;"
          onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--border2)'"
          onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();runGeneratePlan();}"
        ></textarea>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button onclick="toggleGeneratePanel(false)"
            style="font-family:'Geist Mono',monospace;font-size:0.7rem;padding:6px 12px;border-radius:var(--radius);
                   border:1px solid var(--border2);background:none;color:var(--text-3);cursor:pointer"
            onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">Cancel</button>
          <button onclick="runGeneratePlan()" id="triage-gen-btn"
            style="font-family:'Geist Mono',monospace;font-size:0.7rem;padding:6px 18px;border-radius:var(--radius);
                   background:linear-gradient(135deg,var(--accent) 0%,#7c3aed 100%);
                   border:1px solid var(--accent);color:white;cursor:pointer;
                   display:flex;align-items:center;gap:5px">
            <span>✦</span> Generar
          </button>
        </div>
      </div>

      <!-- AI suggestions -->
      <div id="triage-gen-results" style="display:none;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0">

        <button class="prio-pick-btn" data-p="p3" onclick="selectModalPrio('p3')">Medium</button>
        <button class="prio-pick-btn selected" data-p="p4" onclick="selectModalPrio('p4')">Low</button>

      <button class="modal-save" onclick="saveModal()">Create</button>
    </div>
