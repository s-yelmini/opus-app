<script>
// ── STATE ──
let tasks    = JSON.parse(localStorage.getItem('tasks_v4') || '[]');
let milestones = JSON.parse(localStorage.getItem('milestones_v1') || '[]');
let milestoneCounter = parseInt(localStorage.getItem('milestone_counter') || '1');
let habits = JSON.parse(localStorage.getItem('habits_v2') || '[]');
let habitLogs = JSON.parse(localStorage.getItem('habit_logs_v2') || '{}');
let habitCounter = parseInt(localStorage.getItem('habit_counter_v2') || '1');
let savedViews = JSON.parse(localStorage.getItem('saved_views_v1') || '[]');
let selectedIds = new Set(); // multi-select
let counter  = parseInt(localStorage.getItem('tasks_v4_c') || '1');
let currentView  = 'list';
let listFilter   = 'all';
let weekOffset   = 0;
let collapsed    = {};
let unschedOpen  = true;
let selectedId   = null;
let panelWeekOff = 0; // week offset inside the detail panel's mini-picker

let modalDay  = null;
let modalPrio = 'p4';

const PM = {
  p1: { label:'Urgent', short:'URG', color:'var(--red)' },
  p2: { label:'High',   short:'HIG', color:'var(--orange)' },
  p3: { label:'Medium', short:'MED', color:'var(--yellow)' },
  p4: { label:'Low',    short:'LOW', color:'var(--text-3)' },
};

const DAY_NAMES  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let _saveTimer = null;
let _syncTimer = null;
function save() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    localStorage.setItem('tasks_v4', JSON.stringify(tasks));
    localStorage.setItem('tasks_v4_c', counter);
  }, 200);
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks, milestones }),
    }).catch(() => {});
  }, 5000);
}
function saveImmediate() {
  clearTimeout(_saveTimer);
  localStorage.setItem('tasks_v4', JSON.stringify(tasks));
  localStorage.setItem('tasks_v4_c', counter);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DATE HELPERS ──
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function toKey(d) { return d.toISOString().split('T')[0]; }

function getWeekDays(offset) {
  const base = today(), dow = base.getDay();
  const mon = addDays(base, (dow===0?-6:1-dow) + offset*7);
  return Array.from({length:7}, (_,i) => addDays(mon,i));
}

function formatWeekLabel(days) {
  const f=days[0], l=days[6];
  if (f.getMonth()===l.getMonth()) return `${MONTHS[f.getMonth()]} ${f.getDate()}–${l.getDate()}, ${f.getFullYear()}`;
  return `${MONTHS[f.getMonth()]} ${f.getDate()} – ${MONTHS[l.getMonth()]} ${l.getDate()}`;
}

function formatDateDisplay(key) {
  if (!key) return 'No date';
  const d = new Date(key+'T00:00:00');
  return `${DAY_NAMES[d.getDay()===0?6:d.getDay()-1]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

// ── CRUD ──
function addTask(text, priority, dayKey, inbox) {
  if (!text.trim()) return;
  tasks.unshift({ id: counter++, text: text.trim(), priority, done: false, day: dayKey||null, inbox: inbox||false });
  save(); renderAll();
}

function updateTask(id, changes) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  Object.assign(t, changes);
  save();
  renderAll(); // renderAll already calls renderDetail if selectedId is set
}

function toggleDone(id) {
  updateTask(id, { done: !tasks.find(t=>t.id===id).done });
}

function updateSelectionDOM() {
  // Update row highlight classes without full re-render
  document.querySelectorAll('#task-list .task-row').forEach(el => {
    const m = el.getAttribute('onclick')?.match(/selectTask\((\d+)\)/);
    if (!m) return;
    const id = parseInt(m[1]);
    const active = id === selectedId || selectedIds.has(id);
    el.classList.toggle('selected', active);
  });
  // Update action bar
  const allSelected = new Set([...selectedIds, ...(selectedId ? [selectedId] : [])]);
  const bar = document.getElementById('multiselect-bar');
  if (bar) {
    const count = allSelected.size;
    bar.style.display = count > 1 ? 'flex' : 'none';
    const countEl = document.getElementById('multiselect-count');
    if (countEl) countEl.textContent = count + ' selected';
  }
  // Scroll into view
  scrollSelectedIntoView();
}

function bulkDone() {
  const all = new Set([...selectedIds, ...(selectedId?[selectedId]:[])]);
  all.forEach(id => { const t=tasks.find(t=>t.id===id); if(t) t.done=true; });
  save(); selectedIds.clear(); selectedId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderAll();
}
function bulkSetDate(value) {
  const day = value || null;
  const all = new Set([...selectedIds, ...(selectedId ? [selectedId] : [])]);
  all.forEach(id => { const t = tasks.find(t => t.id === id); if (t) t.day = day; });
  save();
  selectedIds.clear(); selectedId = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderAll();
}

function bulkUndone() {
  const all = new Set([...selectedIds, ...(selectedId?[selectedId]:[])]);
  all.forEach(id => { const t=tasks.find(t=>t.id===id); if(t) t.done=false; });
  save(); selectedIds.clear(); selectedId=null; renderAll();
}
function bulkDelete() {
  const all = new Set([...selectedIds, ...(selectedId?[selectedId]:[])]);
  tasks = tasks.filter(t => !all.has(t.id));
  save(); selectedIds.clear(); selectedId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderAll();
}

function setTaskMilestone(id, value) {
  // value is a string from select; convert to number or null
  const mid = value ? parseInt(value) : null;
  updateTask(id, { milestone: mid });
}

function deleteTask(id) {
  tasks = tasks.filter(t=>t.id!==id);
  if (selectedId===id) closeDetail();
  save(); renderAll();
}

// ── VIEW SWITCHING ──
const VIEW_TITLES = {
  list: 'List', week: 'Week', triage: 'Triage',
  habits: 'Habits', milestones: 'Milestones'
};

function switchView(v) {
  currentView = v;

  // Update topbar title
  const title = document.getElementById('topbar-title');
  if (title) title.textContent = VIEW_TITLES[v] || v;

  // Show/hide views
  const el = id => document.getElementById(id);
  const show = (id, val) => { const e = el(id); if (e) e.style.display = val; };

  show('week-view',       v==='week'       ? 'flex'  : 'none');
  show('list-view',       v==='list'       ? 'block' : 'none');
  show('habits-view',     v==='habits'     ? 'flex'  : 'none');
  show('milestones-view', v==='milestones' ? 'flex'  : 'none');
  show('triage-view',     v==='triage'     ? 'flex'  : 'none');

  // Week nav
  show('week-sep',  v==='week'   ? 'block' : 'none');
  show('week-nav',  v==='week'   ? 'flex'  : 'none');
  show('habits-sep', v==='habits' ? 'block' : 'none');
  show('habits-nav', v==='habits' ? 'flex'  : 'none');

  // Topbar buttons
  show('new-issue-btn',     v==='week'       ? ''     : 'none');
  show('triage-gen-topbar-btn', v==='triage'  ? ''     : 'none');
  show('new-habit-btn',     v==='habits'     ? ''     : 'none');
  show('new-milestone-btn', v==='milestones' ? ''     : 'none');

  // Filter bar (list + week only)
  updateFilterBarVisibility();
  syncSidebarNav(v);

  // View-specific init
  if (v==='habits')     { habitMode='week'; habitOffset=0; updateHabitsLabel(); renderHabits(); }
  if (v==='milestones') renderMilestones();
  if (v==='triage')     { renderTriage(); setTimeout(()=>{ const inp=el('triage-inbox-input'); if(inp) inp.focus(); }, 80); }
  if (v==='list')       renderList();
  if (v==='week')       renderWeek();

  updateBadges();
  updateTriageBadge();
  if (selectedId) renderDetail();
}

function switchToList(f) { switchView('list'); }
function setNavActive(btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function syncSidebarNav(v) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navId = { list:'nav-list', week:'nav-week', triage:'nav-triage',
                  milestones:'nav-milestones', habits:'nav-habits' }[v];
  if (navId) { const el = document.getElementById(navId); if (el) el.classList.add('active'); }
  // Refresh habits widget whenever view changes
  setTimeout(updateSidebarHabitsWidget, 50);
}
function shiftWeek(d) { weekOffset+=d; renderWeek(); }
function goToday() { weekOffset=0; renderWeek(); }
function toggleUnsched() {
  unschedOpen=!unschedOpen;
  document.getElementById('unsched-toggle').classList.toggle('collapsed', !unschedOpen);
  document.getElementById('unsched-body').style.display = unschedOpen ? 'flex' : 'none';
}

// ── SELECT / DETAIL ──
function selectTask(id) {
  if (selectedIds.size === 0 && selectedId===id) { closeDetail(); return; }
  selectedIds.clear();
  selectedId = id;
  panelWeekOff = 0;
  document.getElementById('detail-panel').classList.add('open');
  renderAll(); // renderAll calls renderDetail when selectedId is set
}

function closeDetail() {
  selectedId = null;
  selectedIds.clear();
  document.getElementById('detail-panel').classList.remove('open');
  renderAll();
}

function renderDetail() {
  const t = tasks.find(t=>t.id===selectedId);
  if (!t) return;

  document.getElementById('detail-id').textContent = `TSK-${String(t.id).padStart(3,'0')}`;
  document.getElementById('detail-delete-btn').onclick = () => deleteTask(t.id);

  const days = getWeekDays(panelWeekOff);
  const todayKey = toKey(today());

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-title-wrap">
      <textarea class="detail-title" id="detail-title-ta" rows="2">${esc(t.text)}</textarea>
    </div>
    <div class="detail-field">
      <span class="detail-field-label">Status</span>
      <div class="detail-field-value">
        <button class="status-toggle" onclick="updateTask(${t.id},{done:${!t.done}})">
          <div class="status-dot ${t.done?'status-done-dot':'status-todo-dot'}"></div>
          ${t.done ? 'Done' : 'Todo'}
        </button>
      </div>
    </div>
    <div class="detail-field">
      <span class="detail-field-label">Priority</span>
      <div class="detail-field-value">
        <div class="prio-select-row">
          ${['p1','p2','p3','p4'].map(p=>`
            <button class="prio-mini-btn ${t.priority===p?'active':''}" data-p="${p}"
              onclick="updateTask(${t.id},{priority:'${p}'})">
              ${PM[p].short}
            </button>`).join('')}
        </div>
      </div>
    </div>
    <div class="detail-field" style="flex-direction:column;gap:8px;align-items:stretch">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="detail-field-label" style="width:auto">Date</span>
        <span style="font-size:0.68rem;color:var(--text-2)">${formatDateDisplay(t.day)}</span>
      </div>
      <div class="date-field-wrap">
        <div class="week-mini-nav">
          <button class="week-mini-btn" onclick="shiftPanelWeek(-1)">‹</button>
          <span class="week-mini-label" id="panel-week-label">${formatWeekLabel(days)}</span>
          <button class="week-mini-btn" onclick="shiftPanelWeek(1)">›</button>
        </div>
        <div class="week-mini-grid">
          ${days.map((d,i)=>{
            const k=toKey(d);
            return `<button class="day-mini-btn
              ${k===todayKey?'today-d':''}
              ${t.day===k?'selected':''}"
              onclick="updateTask(${t.id},{day:'${k}'})" title="${DAY_NAMES[i]} ${d.getDate()}">
              <div>${DAY_NAMES[i].slice(0,1)}</div>
              <div>${d.getDate()}</div>
            </button>`;
          }).join('')}
        </div>
        ${t.day ? `<button class="date-clear" onclick="updateTask(${t.id},{day:null})">✕ Clear date</button>` : ''}
      </div>
    </div>
    <div class="detail-field">
      <span class="detail-field-label">Milestone</span>
      <div class="detail-field-value">
        <select id="detail-milestone-select"
          onchange="setTaskMilestone(${t.id}, this.value)"
          style="background:var(--surface2);border:1px solid var(--border2);border-radius:4px;
                 font-family:'Geist Mono',monospace;font-size:0.7rem;color:var(--text-2);
                 padding:4px 6px;outline:none;cursor:pointer;width:100%;color-scheme:dark">
          <option value="">No milestone</option>
          ${milestones.map(m=>`<option value="${m.id}" ${t.milestone==m.id?'selected':''}>${esc(m.name)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="detail-field" style="flex-direction:column;gap:6px;align-items:stretch;border-bottom:none;flex:1;min-height:120px">
      <span class="detail-field-label" style="width:auto">Notes</span>
      <textarea id="detail-notes-ta" placeholder="Add notes..."
        style="flex:1;min-height:110px;width:100%;background:none;border:none;outline:none;
               font-family:'Geist Mono',monospace;font-size:0.73rem;color:var(--text-2);
               line-height:1.6;resize:none;padding:2px 0;"
      >${esc(t.notes||'')}</textarea>
    </div>
  `;

  // Clone nodes to drop any stale listeners before attaching fresh ones
  const nta = document.getElementById('detail-notes-ta');
  if (nta) {
    const nta2 = nta.cloneNode(true);
    nta.parentNode.replaceChild(nta2, nta);
    nta2.addEventListener('blur', () => {
      const v = nta2.value;
      if (v !== (t.notes||'')) updateTask(t.id, {notes: v});
    });
  }

  const ta = document.getElementById('detail-title-ta');
  if (ta) {
    const ta2 = ta.cloneNode(true);
    ta.parentNode.replaceChild(ta2, ta);
    ta2.addEventListener('blur', () => {
      const v = ta2.value.trim();
      if (v && v !== t.text) updateTask(t.id, {text: v});
    });
    ta2.addEventListener('keydown', e => {
      if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); ta2.blur(); }
    });
  }
}

function shiftPanelWeek(d) {
  panelWeekOff += d;
  renderDetail();
}

function renderUnschedRow(t) {
  const days = getWeekDays(weekOffset);
  const todayKey = toKey(today());
  const dayBtns = days.map((d, i) => {
    const k = toKey(d);
    const sel = t.day === k;
    const isToday = k === todayKey;
    let cls = 'unsched-day-btn';
    if (sel) cls += ' selected';
    if (isToday) cls += ' today-d';
    return '<button class="' + cls + '" title="' + DAY_NAMES[i] + ' ' + d.getDate() +
      '" onclick="event.stopPropagation();updateTask(' + t.id + ',{day:\'' + k + '\'})">'+
      '<span class="unsched-day-name">' + DAY_NAMES[i].slice(0,1) + '</span>' +
      '<span class="unsched-day-num">' + d.getDate() + '</span>' +
      '</button>';
  }).join('');

  const sel = selectedId === t.id ? 'selected' : '';
  const done = t.done ? 'done' : '';
  return '<div class="unsched-row ' + sel + '" onclick="selectTask(' + t.id + ')">' +
    '<div class="task-chip-check ' + done + '" onclick="event.stopPropagation();toggleDone(' + t.id + ')"></div>' +
    '<div class="task-chip-prio" style="background:' + PM[t.priority].color + '"></div>' +
    '<span class="unsched-row-text">' + esc(t.text) + '</span>' +
    '<div class="unsched-day-picker" onclick="event.stopPropagation()">' + dayBtns + '</div>' +
    '</div>';
}

// ── WEEK RENDER ──
function renderWeek() {
  const days = getWeekDays(weekOffset);
  const todayKey = toKey(today());
  document.getElementById('week-label').textContent = formatWeekLabel(days);

  document.getElementById('week-header').innerHTML = days.map((d,i)=>{
    const key = toKey(d), isToday = key===todayKey;
    const count = tasks.filter(t=>t.day===key&&!t.done).length;
    return `
      <div class="day-header ${isToday?'today':''}" data-day="${key}">
        <span class="day-name">${DAY_NAMES[i]}</span>
        <div class="day-number-row">
          <span class="day-number">${d.getDate()}</span>
          ${count>0?`<span style="font-size:0.58rem;color:var(--text-3)">${count}</span>`:''}
          <button class="day-add-btn" onclick="openModal('${key}')">+</button>
        </div>
      </div>`;
  }).join('');

  const todayInWeek = days.some(d => toKey(d) === todayKey);
  document.getElementById('week-body').innerHTML = days.map((d, i)=>{
    const key=toKey(d), isToday=key===todayKey;

      ${isToday ? '<div class="today-line"></div>' : ''}

        <div class="week-task ${t.done?'is-done':''} ${selectedId===t.id?'selected':''}" onclick="selectTask(${t.id})">
          <div class="task-chip-check ${t.done?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})"></div>
          <div class="task-chip-prio" style="background:${PM[t.priority].color}"></div>
          <span class="task-chip-text">${esc(t.text)}</span>

  }).join('');

  const unsched = applyFilters(tasks.filter(t=>!t.day && !t.done && !t.inbox));

}

// ── LIST RENDER ──
function renderList() {
  let base = tasks.filter(t => !t.inbox);
  base = applyFilters(base);

  const active = base.filter(t => !t.done);
  const done   = base.filter(t => t.done);
  const vf = viewFilters['list'] || {};

  let html = '';
  if (vf.status === 'done') {
    html = renderGroup('Done', 'status-done', done, 'done');
  } else if (vf.status === 'todo') {
    html = renderGroup('Todo', 'status-todo', active, 'todo');
  } else {
    html = renderGroup('Todo', 'status-todo', active, 'todo') +
           renderGroup('Done', 'status-done', done, 'done');
  }

  document.getElementById('task-list').innerHTML = html;
  updateBadges();

  // Multi-select bar
  const allSelected = new Set([...selectedIds, ...(selectedId?[selectedId]:[])]);
  const bar = document.getElementById('multiselect-bar');
  if (bar) {
    const count = allSelected.size;
    if (count > 1) {
      bar.style.display = 'flex';
      document.getElementById('multiselect-count').textContent = count + ' selected';

// ── QUICK INPUT ──
document.getElementById('task-input').addEventListener('keydown', e=>{
  if (e.key==='Enter') {
    addTask(document.getElementById('task-input').value, 'p4', null, false);
    document.getElementById('task-input').value='';
  }
});

document.addEventListener('keydown', e=>{
  const inInput = document.activeElement.tagName==='INPUT' || document.activeElement.tagName==='TEXTAREA';
  const modalOpen = document.getElementById('modal').style.display!=='none';
  const paletteOpen = document.getElementById('palette').style.display!=='none';

  // Cmd+K — open palette from anywhere
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    paletteOpen ? closePalette() : openPalette();
    return;
  }

  // Cmd+B — toggle sidebar
  if ((e.metaKey || e.ctrlKey) && e.key === 'b') {
    e.preventDefault(); toggleSidebar(); return;
  }

  if (paletteOpen) return; // palette handles its own keys

  if (modalOpen) {
    if (e.key==='Escape') { closeModal(); return; }
    if (e.key==='Enter' && document.activeElement===document.getElementById('modal-title-input')) { saveModal(); return; }
    return;
  }

  if (e.key==='Escape') { closeDetail(); return; }
  if (inInput) return;

  switch(e.key) {
    case 'n': case 'N':
      e.preventDefault();
      if(currentView!=='list'){switchView('list');syncSidebarNav('list');}
      setTimeout(()=>document.getElementById('task-input')?.focus(),60);
      break;

    case 'c': case 'C':
      e.preventDefault(); openModal(); break;

    case 'ArrowDown': case 'j': {
      e.preventDefault();
      const ids = getVisibleIds();
      if (!ids.length) break;
      const idx = ids.indexOf(selectedId);
      const nextIdx = idx === -1 ? 0 : Math.min(idx+1, ids.length-1);
      const nextId = ids[nextIdx];
      if (e.shiftKey) {
        if (selectedId === null) { selectTask(nextId); break; }
        selectedIds.add(selectedId);
        selectedIds.add(nextId);
        selectedId = nextId;
        updateSelectionDOM();
      } else {
        selectedIds.clear();
        selectTask(nextId);
      }
      scrollSelectedIntoView();
      break;
    }

    case 'ArrowUp': case 'k': {
      e.preventDefault();
      const ids = getVisibleIds();
      if (!ids.length) break;
      const idx = ids.indexOf(selectedId);
      if (idx <= 0) break;
      const prevId = ids[idx-1];
      if (e.shiftKey) {
        selectedIds.add(selectedId);
        selectedIds.add(prevId);
        selectedId = prevId;
        updateSelectionDOM();
      } else {
        selectedIds.clear();
        selectTask(prevId);
      }
      scrollSelectedIntoView();
      break;
    }

    case 'd': case 'D':
      e.preventDefault();
      if (selectedIds.size > 0) {
        // toggle done for all selected
        const allDone = [...selectedIds].every(id => tasks.find(t=>t.id===id)?.done);
        [...selectedIds].forEach(id => updateTask(id, { done: !allDone }));
        if (selectedId) updateTask(selectedId, { done: !allDone });
        selectedIds.clear();
      } else if (selectedId) {
        toggleDone(selectedId);
      }
      break;

    case 't': case 'T':
      if (selectedId) {
        e.preventDefault();
        const _t = tasks.find(t => t.id === selectedId);
        if (_t) {
          const _todayKey = toKey(today());
          updateTask(selectedId, { day: _t.day === _todayKey ? null : _todayKey });
        }
      }
      break;

    case 'Backspace': case 'Delete':
      e.preventDefault();
      if (selectedIds.size > 0) {
        const toDelete = [...selectedIds, selectedId].filter(Boolean);
        toDelete.forEach(id => {
          tasks = tasks.filter(t => t.id !== id);
        });
        selectedIds.clear();
        selectedId = null;
        document.getElementById('detail-panel').classList.remove('open');
        save(); renderAll();
      } else if (selectedId) {
        deleteTask(selectedId);
      }
      break;

    case 'e': case 'E':
      if (selectedId) {
        e.preventDefault();
        if (!document.getElementById('detail-panel').classList.contains('open')) selectTask(selectedId);
        setTimeout(()=>{ const ta=document.getElementById('detail-title-ta'); if(ta){ta.focus();ta.select();} }, 60);
      }
      break;

    case '?':
      e.preventDefault(); toggleKbdHelp(); break;
  }
});

function getVisibleIds() {
  return Array.from(document.querySelectorAll('#task-list .task-row'))
    .map(el => { const m = el.getAttribute('onclick')?.match(/selectTask\((\d+)\)/); return m ? parseInt(m[1]) : null; })
    .filter(Boolean);
}

function scrollSelectedIntoView() {
  const el = document.querySelector('#task-list .task-row.selected');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function toggleKbdHelp() {
  let ov = document.getElementById('kbd-help');
  if (ov) { ov.remove(); return; }
  ov = document.createElement('div');
  ov.id = 'kbd-help';
  ov.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:200;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;min-width:210px;box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:\'Geist Mono\',monospace;animation:modalIn 0.15s ease;';
  const shortcuts = [['↑ / k','Navigate'],['⇧↑↓','Multi-select'],['D','Toggle done'],['T','Assign today'],['E','Edit title'],['N','Quick add task'],['C','New issue (modal)'],['Del','Delete'],['Tab','Switch view'],['Esc','Close'],['?','Help']];
  ov.innerHTML = '<div style="font-size:0.63rem;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px">Shortcuts</div>' +
    shortcuts.map(([k,v])=>`<div style="display:flex;justify-content:space-between;gap:20px;padding:3px 0;border-bottom:1px solid var(--border)"><span style="font-size:0.68rem;color:var(--accent)">${k}</span><span style="font-size:0.68rem;color:var(--text-3)">${v}</span></div>`).join('') +
    '<div style="font-size:0.63rem;color:var(--text-3);margin-top:8px;text-align:center">click to dismiss</div>';
  ov.addEventListener('click', ()=>ov.remove());
  document.body.appendChild(ov);
}

// habits state moved to top
let habitMode = 'week';
let habitOffset = 0;
let habitModalEditId = null;
let habitColor = '#5E6AD2';
let habitFreq = 7; // target days/week
// drag state
let dragSrcIdx = null;

let _saveHabitsTimer = null;
function saveHabits() {
  clearTimeout(_saveHabitsTimer);
  _saveHabitsTimer = setTimeout(() => {
    localStorage.setItem('habits_v2', JSON.stringify(habits));
    localStorage.setItem('habit_logs_v2', JSON.stringify(habitLogs));
    localStorage.setItem('habit_counter_v2', habitCounter);
  }, 200);
}

function habitLogKey(id, dateKey) { return id + '_' + dateKey; }
function toggleHabitLog(id, dateKey) {
  const h = habits.find(h => h.id === id);
  if (h && h.paused) return;
  const k = habitLogKey(id, dateKey);
  if (habitLogs[k]) delete habitLogs[k]; else habitLogs[k] = true;
  saveHabits(); renderHabits();

  updateSidebarHabitsWidget();}
function isLogged(id, dateKey) { return !!habitLogs[habitLogKey(id, dateKey)]; }

// Streak: consecutive days ending today (or yesterday if today not logged)
function getStreak(id) {
  let streak = 0, d = new Date(today());
  if (!isLogged(id, toKey(d))) d = addDays(d, -1);
  while (isLogged(id, toKey(d))) { streak++; d = addDays(d, -1); }
  return streak;
}

// % vs target freq — counts logged days in period vs target*weeks_elapsed
function getWeekPct(id, days, freq) {
  const logged = days.filter(d => isLogged(id, toKey(d)) && d <= today()).length;
  return logged >= freq ? 100 : Math.round((logged / freq) * 100);
}

// completion count for a week
function getWeekCount(id, days) {
  return days.filter(d => isLogged(id, toKey(d)) && d <= today()).length;
}

// Color fill based on progress toward target
function fillColor(baseColor, logged, target) {
  if (logged === 0) return null;
  if (logged >= target) return baseColor;
  // partial: return color with reduced opacity
  const pct = logged / target;
  const alpha = 0.25 + pct * 0.75;
  return baseColor + Math.round(alpha * 255).toString(16).padStart(2, '0');
}

function setHabitMode(m) {
  habitMode = m;
  habitOffset = 0;
  document.getElementById('htab-week').classList.toggle('active', m==='week');
  document.getElementById('htab-month').classList.toggle('active', m==='month');
  const ytab = document.getElementById('htab-year');
  if (ytab) ytab.classList.toggle('active', m==='year');
  updateHabitsLabel(); renderHabits();
}

function shiftHabitPeriod(d) { habitOffset += d; updateHabitsLabel(); renderHabits(); }
function habitGoToday() { habitOffset = 0; updateHabitsLabel(); renderHabits(); }

function updateHabitsLabel() {
  const el = document.getElementById('habits-label');
  if (!el) return;
  if (habitMode === 'week') el.textContent = formatWeekLabel(getWeekDays(habitOffset));
  else if (habitMode === 'month') {
    const d = new Date(today()); d.setMonth(d.getMonth() + habitOffset);
    el.textContent = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  } else {
    const yr = new Date(today()).getFullYear() + habitOffset;
    el.textContent = String(yr);
  }
}

function getMonthDays(offset) {
  const ref = new Date(today()); ref.setDate(1); ref.setMonth(ref.getMonth() + offset);
  const year = ref.getFullYear(), month = ref.getMonth(), days = [];
  const d = new Date(year, month, 1);
  while (d.getMonth() === month) { days.push(new Date(d)); d.setDate(d.getDate()+1); }
  return days;
}

let _habitsRenderHash = '';
function renderHabits() {
  const hash = JSON.stringify(habits) + JSON.stringify(habitLogs) + habitMode + habitOffset;
  if (hash === _habitsRenderHash && document.getElementById('habits-content')?.children.length) return;
  _habitsRenderHash = hash;
  if (habitMode === 'week') renderHabitsWeek();
  else if (habitMode === 'month') renderHabitsMonth();
  else renderHabitsYear();
}

// hex color to rgba helper
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderHabitsWeek() {
  const days = getWeekDays(habitOffset);
  const todayKey = toKey(today());
  const activeHabits = habits.filter(h => !h.paused);
  const pausedHabits = habits.filter(h => h.paused);

  if (!habits.length) {
    document.getElementById('habits-content').innerHTML = `<div style="padding:48px 20px;text-align:center">
      <div style="font-size:0.75rem;color:var(--text-3);margin-bottom:12px">No habits yet.</div>
      <button class="habit-add-btn" style="margin:0 auto;justify-content:center" onclick="openHabitModal()">+ Add first habit</button>
    </div>`; return;
  }

  let html = '<div style="overflow-x:auto">';
  html += '<table class="habit-matrix" style="min-width:100%;table-layout:fixed">';

  // Header
  html += '<colgroup>';
  html += '<col style="width:180px;min-width:180px">';

  html += '<col style="width:60px;min-width:60px">';
  html += '<col style="width:70px;min-width:70px">';
  html += '</colgroup>';

  html += '<thead><tr>';
  html += '<th style="text-align:left;padding:8px 16px;font-size:0.6rem;color:var(--text-3);letter-spacing:0.06em">HABIT</th>';
  days.forEach((d, i) => {
    const key = toKey(d), isToday = key === todayKey;
    html += `<th class="${isToday?'today-col':''}" style="text-align:center;padding:8px 2px">
      <div style="font-size:0.6rem;letter-spacing:0.04em">${DAY_NAMES[i]}</div>
      <div style="font-size:0.78rem;color:${isToday?'var(--accent)':'var(--text-2)'};font-weight:${isToday?'500':'300'};margin-top:1px">${d.getDate()}</div>
    </th>`;
  });
  html += '<th class="stat-col" style="font-size:0.58rem;color:var(--text-3);letter-spacing:0.05em;text-align:center">STREAK</th>';
  html += '<th class="stat-col" style="font-size:0.58rem;color:var(--text-3);letter-spacing:0.05em;text-align:center">DONE</th>';
  html += '</tr></thead><tbody>';

  function renderHabitRow(h, idx) {
    const freq = h.freq || 7;
    const count = getWeekCount(h.id, days);
    const streak = getStreak(h.id);
    const pct = getWeekPct(h.id, days, freq);
    const pctColor = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : count > 0 ? 'var(--orange)' : 'var(--text-3)';
    const isPaused = h.paused;

    let row = `<tr class="habit-row${isPaused?' paused':''}" data-idx="${idx}" draggable="true"
      ondragstart="habitDragStart(event,${idx})"
      ondragover="habitDragOver(event,${idx})"
      ondrop="habitDrop(event,${idx})"
      ondragend="habitDragEnd()"
      style="${isPaused?'opacity:0.45':''}">`;

    row += `<td class="habit-name-col"><div class="habit-name-col-inner">
      <div style="cursor:grab;color:var(--text-3);font-size:0.65rem;margin-right:2px;opacity:0.4;user-select:none">⠿</div>
      <div class="habit-color-bar" style="background:${isPaused?'var(--text-3)':h.color}"></div>
      <span class="habit-name-text" style="${isPaused?'color:var(--text-3)':''}">
        ${esc(h.name)}

        ${isPaused?'<span style="font-size:0.58rem;color:var(--text-3);margin-left:4px">[paused]</span>':''}
      </span>
      <div class="habit-actions-cell">
        <button style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.68rem;padding:2px 4px;border-radius:3px;line-height:1" onclick="editHabit(${h.id})" title="Edit">✎</button>

      </div>
    </div></td>`;

    days.forEach(d => {
      const key = toKey(d);
      const logged = isLogged(h.id, key);
      const isFuture = d > today();
      const isToday = key === todayKey;
      const bgColor = logged ? (h.paused ? '#555' : h.color) : null;
      row += `<td class="habit-cell" style="padding:6px 2px;text-align:center">
        <div class="habit-check ${logged?'checked':''} ${isFuture?'future':''} ${isToday&&!logged?'today-check':''}"
          style="margin:0 auto;${bgColor?'background:'+bgColor+';border-color:transparent;':''}"
          onclick="toggleHabitLog(${h.id},'${key}')">
        </div>
      </td>`;
    });

    row += `<td class="stat-col" style="text-align:center;padding:8px 4px">
      <div class="stat-streak">${streak > 0 ? streak : '—'}</div>
      <div class="stat-streak-label">${streak > 0 ? 'day'+(streak>1?'s':'') : ''}</div>
    </td>`;

    // Done col: shows count/freq with progress bar
    row += `<td class="stat-col" style="text-align:center;padding:8px 6px">
      <div style="font-size:0.75rem;font-weight:500;color:${pctColor}">${count}/${freq}</div>
      <div style="margin-top:3px;height:3px;border-radius:2px;background:var(--border2);overflow:hidden">
        <div style="height:100%;border-radius:2px;background:${pctColor};width:${Math.min(pct,100)}%;transition:width 0.2s"></div>
      </div>
    </td>`;
    row += '</tr>';
    return row;
  }

  activeHabits.forEach((h, i) => { html += renderHabitRow(h, habits.indexOf(h)); });

  if (pausedHabits.length) {
    html += `<tr><td colspan="${days.length+3}" style="padding:6px 16px;font-size:0.6rem;color:var(--text-3);letter-spacing:0.06em;text-transform:uppercase;border-top:1px solid var(--border)">Paused</td></tr>`;
    pausedHabits.forEach(h => { html += renderHabitRow(h, habits.indexOf(h)); });
  }

  html += `<tr class="habit-add-row"><td colspan="${days.length+3}">
    <button class="habit-add-btn" onclick="openHabitModal()">+ Add habit</button>
  </td></tr>`;

  html += '</tbody></table></div>';
  document.getElementById('habits-content').innerHTML = html;
}

function renderHabitsMonth() {
  const days = getMonthDays(habitOffset);
  const todayKey = toKey(today());
  const activeHabits = habits.filter(h => !h.paused);

  if (!habits.length) {
    document.getElementById('habits-content').innerHTML = `
      <div style="padding:48px 20px;text-align:center">
        <div style="font-size:0.75rem;color:var(--text-3);margin-bottom:12px">No habits yet.</div>
        <button class="habit-add-btn" style="margin:0 auto;justify-content:center" onclick="openHabitModal()">+ Add first habit</button>
      </div>`;
    return;
  }

  // Week-day header labels for month (grouped by week visually)
  const DAY_SHORT = ['M','T','W','T','F','S','S'];

  let html = '<div style="overflow-x:auto">';
  html += '<table class="habit-matrix" style="min-width:100%;table-layout:auto">';

  // Header — habit name col + one col per day
  html += '<thead><tr>';
  html += '<th style="text-align:left;padding:8px 16px;font-size:0.6rem;color:var(--text-3);letter-spacing:0.06em;white-space:nowrap;min-width:160px">HABIT</th>';

  days.forEach(d => {
    const key = toKey(d);
    const isToday = key === todayKey;
    const dow = d.getDay() === 0 ? 6 : d.getDay() - 1; // 0=Mon
    const isWeekend = dow >= 5;
    html += `<th style="text-align:center;padding:6px 1px;min-width:26px;width:26px;
      ${isToday ? 'color:var(--accent)' : isWeekend ? 'color:var(--text-3)' : 'color:var(--text-3)'}">
      <div style="font-size:0.52rem;letter-spacing:0.04em;opacity:0.6">${DAY_SHORT[dow]}</div>
      <div style="font-size:0.72rem;font-weight:${isToday?'500':'300'};color:${isToday?'var(--accent)':'var(--text-2)'};margin-top:1px">${d.getDate()}</div>
    </th>`;
  });

  html += '<th style="text-align:center;padding:8px 6px;font-size:0.58rem;color:var(--text-3);letter-spacing:0.05em;border-left:1px solid var(--border);white-space:nowrap;min-width:48px">STREAK</th>';
  html += '<th style="text-align:center;padding:8px 6px;font-size:0.58rem;color:var(--text-3);letter-spacing:0.05em;border-left:1px solid var(--border);white-space:nowrap;min-width:56px">MONTH %</th>';
  html += '</tr></thead><tbody>';

  activeHabits.forEach(h => {
    const freq = h.freq || 7;
    const streak = getStreak(h.id);
    const loggedDays = days.filter(d => isLogged(h.id, toKey(d))).length;
    const elapsedDays = days.filter(d => d <= today()).length;
    const weeksElapsed = Math.max(1, elapsedDays / 7);
    const targetSoFar = Math.min(days.length, Math.round(weeksElapsed * freq));
    const pct = targetSoFar > 0 ? Math.min(100, Math.round((loggedDays / targetSoFar) * 100)) : 0;
    const pctColor = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : pct > 0 ? 'var(--orange)' : 'var(--text-3)';

    html += `<tr class="habit-row" data-hid="${h.id}">`;

    // Name cell
    html += `<td class="habit-name-col"><div class="habit-name-col-inner">
      <div style="cursor:grab;color:var(--text-3);font-size:0.65rem;margin-right:2px;opacity:0.4;user-select:none">⠿</div>
      <div class="habit-color-bar" style="background:${h.color}"></div>
      <span class="habit-name-text">${esc(h.name)}<span style="font-size:0.58rem;color:var(--text-3);margin-left:4px">${freq}/wk</span></span>
      <div class="habit-actions-cell">
        <button style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.68rem;padding:2px 4px;border-radius:3px" onclick="editHabit(${h.id})">✎</button>
        <button style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.68rem;padding:2px 4px;border-radius:3px" onclick="deleteHabit(${h.id})">✕</button>
      </div>
    </div></td>`;

    // Day cells
    days.forEach(d => {
      const key = toKey(d);
      const logged = isLogged(h.id, key);
      const isFuture = d > today();
      const isToday = key === todayKey;
      const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
      const isMonday = dow === 0 && d.getDate() > 1; // subtle week separator

      html += `<td style="text-align:center;padding:4px 1px;vertical-align:middle;${isMonday?'border-left:1px solid var(--border)':''}">
        <div class="habit-check ${logged?'checked':''} ${isFuture?'future':''} ${isToday&&!logged?'today-check':''}"
          style="margin:0 auto;width:20px;height:20px;border-radius:4px;${logged?'background:'+h.color+';border-color:transparent;':''}"
          onclick="toggleHabitLog(${h.id},'${key}')">
        </div>
      </td>`;
    });

    // Streak
    html += `<td style="text-align:center;padding:8px 6px;border-left:1px solid var(--border)">
      <div style="font-size:0.75rem;font-weight:500;color:var(--text)">${streak > 0 ? streak : '—'}</div>
      <div style="font-size:0.56rem;color:var(--text-3)">${streak > 0 ? 'days' : ''}</div>
    </td>`;

    // Month %
    html += `<td style="text-align:center;padding:8px 6px;border-left:1px solid var(--border)">
      <div style="font-size:0.75rem;font-weight:500;color:${pctColor}">${pct > 0 ? pct+'%' : '—'}</div>
      <div style="height:3px;border-radius:2px;background:var(--border2);margin:3px 4px 0;overflow:hidden">
        <div style="height:100%;border-radius:2px;background:${pctColor};width:${Math.min(pct,100)}%"></div>
      </div>
    </td>`;

    html += '</tr>';
  });

  // Add habit row
  html += `<tr class="habit-add-row"><td colspan="${days.length + 3}">
    <button class="habit-add-btn" onclick="openHabitModal()">+ Add habit</button>
  </td></tr>`;

  html += '</tbody></table></div>';
  document.getElementById('habits-content').innerHTML = html;
}

// ── DRAG TO REORDER ──
function habitDragStart(e, idx) { dragSrcIdx = idx; e.dataTransfer.effectAllowed = 'move'; }
function habitDragOver(e, idx) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function habitDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const moved = habits.splice(dragSrcIdx, 1)[0];
  habits.splice(idx, 0, moved);
  dragSrcIdx = null;
  saveHabits(); renderHabits(); updateSidebarHabitsWidget();
}
function habitDragEnd() { dragSrcIdx = null; }

// ── HABIT MODAL ──
function changeFreq(delta) {
  habitFreq = Math.max(1, Math.min(7, habitFreq + delta));
  document.getElementById('freq-display').textContent = habitFreq;
}

function toggleHabitPause() {
  if (!habitModalEditId) return;
  const h = habits.find(h => h.id === habitModalEditId);
  if (!h) return;
  h.paused = !h.paused;
  saveHabits(); closeHabitModal(); renderHabits();
}

function openHabitModal(editId) {
  habitModalEditId = editId || null;
  habitColor = '#5E6AD2';
  habitFreq = 7;
  const pauseBtn = document.getElementById('habit-pause-btn');

  if (editId) {
    const h = habits.find(h => h.id === editId);
    if (!h) return;
    document.getElementById('habit-name-input').value = h.name;
    habitColor = h.color;
    habitFreq = h.freq || 7;
    document.getElementById('habit-modal-title').textContent = 'Edit habit';
    document.getElementById('habit-modal-save').textContent = 'Save';
    if (pauseBtn) {
      pauseBtn.style.display = '';
      pauseBtn.textContent = h.paused ? 'Resume' : 'Pause';
    }
  } else {
    document.getElementById('habit-name-input').value = '';
    document.getElementById('habit-modal-title').textContent = 'New habit';
    document.getElementById('habit-modal-save').textContent = 'Create';
    if (pauseBtn) pauseBtn.style.display = 'none';
  }

  document.getElementById('freq-display').textContent = habitFreq;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.style.border = s.dataset.c === habitColor ? '2px solid white' : '2px solid transparent';
  });
  document.getElementById('habit-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('habit-name-input').focus(), 50);
}

function closeHabitModal() { document.getElementById('habit-modal').style.display = 'none'; }

function selectHabitColor(c) {
  habitColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.style.border = s.dataset.c === c ? '2px solid white' : '2px solid transparent';
  });
}

function saveHabitModal() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) { document.getElementById('habit-name-input').focus(); return; }
  if (habitModalEditId) {
    const h = habits.find(h => h.id === habitModalEditId);
    if (h) { h.name = name; h.color = habitColor; h.freq = habitFreq; }
  } else {
    habits.push({ id: habitCounter++, name, color: habitColor, freq: habitFreq, paused: false });
  }
  saveHabits(); closeHabitModal(); renderHabits();

  updateSidebarHabitsWidget();
  updateSidebarHabitsWidget();}

function editHabit(id) { openHabitModal(id); }

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  Object.keys(habitLogs).forEach(k => { if (k.startsWith(id+'_')) delete habitLogs[k]; });
  saveHabits(); renderHabits();
}

document.addEventListener('DOMContentLoaded', () => {
  const hni = document.getElementById('habit-name-input');
  if (hni) hni.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveHabitModal();
    if (e.key === 'Escape') closeHabitModal();
  });
});

let triageIdx = 0;      // index into inbox tasks array
let triagePrio = 'p4';
let triageDay = null;
let triageSkipped = []; // ids skipped this session

function getInboxTasks() {

}

function triageQuickAdd() {

function updateTriageBadge() { updateBadges(); }

function renderTriage() {
  const inbox = getInboxTasks();
  const container = document.getElementById('triage-content');
  if (!container) return;

  if (inbox.length === 0) {
    container.innerHTML = `
      <div class="triage-empty">
        <div class="triage-empty-icon">✓</div>
        <div class="triage-empty-text">Inbox zero.</div>
        <button onclick="toggleTriageInput(true)" style="margin-top:8px;font-family:'Geist Mono',monospace;font-size:0.7rem;background:none;border:1px solid var(--border2);color:var(--text-3);padding:5px 14px;border-radius:5px;cursor:pointer" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">+ Add to inbox</button>
      </div>`;
    return;
  }

  const rows = inbox.map(t => `
    <div class="triage-row" id="triage-row-${t.id}">
      <div class="triage-row-prio" style="background:${PM[t.priority||'p4'].color}"></div>
      <span class="triage-row-text" ondblclick="triageEditText(${t.id})" title="Double-click to edit">${esc(t.text)}</span>
      <div class="triage-row-actions">
        <button class="triage-row-btn skip" onclick="triageDiscard(${t.id})">Discard</button>
        <button class="triage-row-btn accept" onclick="triageAccept(${t.id})">Accept</button>
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div style="width:100%;max-width:580px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:0.7rem;color:var(--text-3);letter-spacing:0.06em;text-transform:uppercase">${inbox.length} pending</span>
        <button onclick="triageAcceptAll()" style="font-family:'Geist Mono',monospace;font-size:0.68rem;color:var(--text-3);background:none;border:none;cursor:pointer;padding:3px 0" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">Accept all →</button>
      </div>
      <div id="triage-list">${rows}</div>
    </div>`;
}

function triageEditText(id) {
  const row = document.getElementById('triage-row-' + id);
  if (!row) return;
  const span = row.querySelector('.triage-row-text');
  if (!span) return;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = t.text;
  inp.style.cssText = 'flex:1;background:none;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:"Geist Mono",monospace;font-size:0.78rem;outline:none;padding:0 2px;min-width:0';
  span.replaceWith(inp);
  inp.focus();
  inp.select();
  let done = false;
  const commit = () => {
    if (done) return; done = true;
    const v = inp.value.trim();
    if (v && v !== t.text) updateTask(id, { text: v }); else renderTriage();
  };
  const cancel = () => { if (done) return; done = true; renderTriage(); };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  inp.addEventListener('blur', commit);
}

function triageQuickAdd() {
  const el = document.getElementById('triage-quick-input');
  if (!el) return;
  const text = el.value.trim();
  if (!text) return;
  addTask(text, 'p4', null, true);
  renderTriage();
}

function setTriagePrio(p) {
  triagePrio = p;
  document.querySelectorAll('.triage-prio-btn').forEach(b => b.classList.toggle('active', b.dataset.p===p));
}

function setTriageDay(k) {
  triageDay = k;
  document.querySelectorAll('.triage-day-btn').forEach(b => {
    const isNone = b.classList.contains('none-d');
    b.classList.toggle('active', k===null ? isNone : b.getAttribute('onclick')===`setTriageDay('${k}')`);
  });
}

function triageAccept(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.inbox = false;
  t.done = false;
  save();
  renderList();
  updateTriageBadge();
  renderTriage();
}

function triageAcceptAll() {
  getInboxTasks().forEach(t => { t.inbox = false; t.done = false; });
  save();
  renderList();
  updateTriageBadge();
  renderTriage();
}


function triageQuickAdd() {
  const inp = document.getElementById('triage-quick-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  addTask(text, 'p4', null, true);
}

function toggleTriageInput(forceOpen) {
  const bar = document.getElementById('triage-input-bar');
  const inp = document.getElementById('triage-inbox-input');
  if (!bar) return;
  const open = forceOpen !== undefined ? forceOpen : bar.style.display === 'none';
  bar.style.display = open ? 'flex' : 'none';
  if (open && inp) { inp.value = ''; inp.focus(); }
}

function submitTriageInput() {
  const inp = document.getElementById('triage-inbox-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  inp.value = '';
  inp.focus();
  addTask(text, 'p4', null, true);
}

function handleTriageInputKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitTriageInput(); }
  if (e.key === 'Escape') toggleTriageInput(false);
}

function triageDiscard(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderList();
  updateTriageBadge();
  renderTriage();
}

let paletteActiveIdx = 0;

const PALETTE_VIEWS = [
  { icon: '▦', label: 'Week',       sub: 'view', action: ()=>switchView('week') },
  { icon: '≡', label: 'List',       sub: 'view', action: ()=>switchView('list') },
  { icon: '⊡', label: 'Triage',     sub: 'view', action: ()=>switchView('triage') },
  { icon: '◈', label: 'Milestones', sub: 'view', action: ()=>switchView('milestones') },
  { icon: '◉', label: 'Habits',     sub: 'view', action: ()=>switchView('habits') },
];

let _paletteDebounceTimer = null;
function debouncedRenderPalette() {
  clearTimeout(_paletteDebounceTimer);
  _paletteDebounceTimer = setTimeout(renderPalette, 80);
}

let _paletteDebounce = null;
function debouncedRenderPalette() {
  clearTimeout(_paletteDebounce);
  _paletteDebounce = setTimeout(renderPalette, 80);
}

function openPalette() {
  document.getElementById('palette').style.display = 'flex';
  const inp = document.getElementById('palette-input');
  inp.value = '';
  renderPalette();
  setTimeout(() => inp.focus(), 30);
}

function closePalette() {
  document.getElementById('palette').style.display = 'none';
}

function renderPalette() {
  const q = document.getElementById('palette-input').value.trim().toLowerCase();
  const results = document.getElementById('palette-results');
  let html = '';
  let idx = 0;
  paletteActiveIdx = 0;

  // Views
  const views = PALETTE_VIEWS.filter(v => !q || v.label.toLowerCase().includes(q));
  if (views.length) {
    html += `<div class="palette-section-label">Views</div>`;
    views.forEach(v => {
      html += `<div class="palette-item ${idx===0?'active':''}" data-idx="${idx}" onclick="paletteSelect(${idx})">
        <span class="palette-item-icon">${v.icon}</span>
        <span class="palette-item-text">${v.label}</span>
        <span class="palette-item-sub">${v.sub}</span>
      </div>`;
      idx++;
    });
  }

  // Issues
  const issueMatches = q
    ? tasks.filter(t => !t.inbox && t.text.toLowerCase().includes(q)).slice(0, 8)
    : [];

  if (issueMatches.length) {
    html += `<div class="palette-section-label">Issues</div>`;
    issueMatches.forEach(t => {
      html += `<div class="palette-item" data-idx="${idx}" onclick="paletteSelect(${idx})">
        <span class="palette-item-icon" style="color:${PM[t.priority].color}">●</span>
        <span class="palette-item-text">${esc(t.text)}</span>
        <span class="palette-item-sub">TSK-${String(t.id).padStart(3,'0')}</span>
      </div>`;
      idx++;
    });
  }

  if (!html) html = '<div class="palette-empty">No results</div>';
  results.innerHTML = html;

  // Store actions for keyboard nav
  results._actions = [...views.map(v=>v.action), ...issueMatches.map(t=>()=>{
    switchView('list'); setTimeout(()=>selectTask(t.id), 50);
  })];
}

function paletteSelect(idx) {
  const actions = document.getElementById('palette-results')._actions || [];
  if (actions[idx]) { actions[idx](); closePalette(); }
}

function paletteKey(e) {
  const results = document.getElementById('palette-results');
  const items = results.querySelectorAll('.palette-item');
  const actions = results._actions || [];

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    paletteActiveIdx = Math.min(paletteActiveIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    paletteActiveIdx = Math.max(paletteActiveIdx - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (actions[paletteActiveIdx]) { actions[paletteActiveIdx](); closePalette(); }
    return;
  } else if (e.key === 'Escape') {
    closePalette(); return;
  } else { return; }

  items.forEach((el, i) => el.classList.toggle('active', i === paletteActiveIdx));
  items[paletteActiveIdx]?.scrollIntoView({ block: 'nearest' });
}

// milestone modal state
let milestoneColor = '#5E6AD2';
let milestoneModalEditId = null;
let milestoneExpanded = {};
let milestoneDragSrc = null;

let _saveMilestonesTimer = null;
function saveMilestones() {
  clearTimeout(_saveMilestonesTimer);
  _saveMilestonesTimer = setTimeout(() => {
    localStorage.setItem('milestones_v1', JSON.stringify(milestones));
    localStorage.setItem('milestone_counter', milestoneCounter);
  }, 200);
}

function getMilestoneTasks(mid) {
  return tasks.filter(t => t.milestone === mid && !t.inbox);
}

function getMilestoneProgress(mid) {
  const ts = getMilestoneTasks(mid);
  const done = ts.filter(t => t.done).length;
  return { total: ts.length, done, pct: ts.length ? Math.round((done/ts.length)*100) : 0 };
}

let _milestonesRenderHash = '';
function renderMilestones() {
  const el = document.getElementById('milestones-content');
  if (!el) return;
  const hash = JSON.stringify(milestones) + JSON.stringify(tasks.map(t=>({id:t.id,done:t.done,milestone:t.milestone})));
  if (hash === _milestonesRenderHash && el.children.length) return;
  _milestonesRenderHash = hash;

  if (!milestones.length) {
    el.innerHTML = `<div class="milestone-empty">No milestones yet.<br><br>
      <button onclick="openMilestoneModal()" style="font-family:'Geist Mono',monospace;font-size:0.72rem;background:none;border:1px solid var(--border2);color:var(--text-3);padding:6px 14px;border-radius:5px;cursor:pointer">+ New milestone</button>
    </div>`;
    return;
  }

  const todayKey = toKey(today());
  const MONTHS_SHORT = MONTHS.map(m => m.slice(0,3));

  // Table header
  let html = `<div class="milestone-table-header">
    <span class="ms-col-name" style="padding-left:52px">Name</span>
    <span class="ms-col-date">Due date</span>
    <span class="ms-col-count">Issues</span>
    <span class="ms-col-pct">Progress</span>
    <span class="ms-col-actions"></span>
  </div>`;

  milestones.forEach(m => {
    const { total, done, pct } = getMilestoneProgress(m.id);
    const isExpanded = milestoneExpanded[m.id] === true;
    const pctColor = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : pct > 0 ? 'var(--orange)' : 'var(--text-3)';

    // Date label
    let dateLabel = '—', dateClass = '';
    if (m.due) {
      const due = new Date(m.due + 'T00:00:00');
      const diff = Math.round((due - today()) / 86400000);
      if (pct === 100)   { dateLabel = MONTHS_SHORT[due.getMonth()] + ' ' + due.getDate(); }
      else if (diff < 0) { dateLabel = Math.abs(diff) + 'd overdue'; dateClass = 'overdue'; }
      else if (diff === 0) { dateLabel = 'Today'; dateClass = 'soon'; }
      else if (diff <= 7)  { dateLabel = diff + 'd left'; dateClass = 'soon'; }
      else { dateLabel = MONTHS_SHORT[due.getMonth()] + ' ' + due.getDate(); }
    }

    // Main row
    html += `<div class="milestone-row"
      draggable="false"
      onclick="toggleMilestoneExpand(${m.id})"
      ondragover="msDragOver(event,${milestones.indexOf(m)})"
      ondrop="msDrop(event,${milestones.indexOf(m)})"
      ondragend="msDragEnd()">
      <span class="ms-row-drag"
        draggable="true"
        ondragstart="event.stopPropagation();msDragStart(event,${milestones.indexOf(m)})"
        onclick="event.stopPropagation()">⠿</span>
      <div class="ms-row-color" style="background:${m.color}"></div>
      <span class="ms-row-name">${esc(m.name)}</span>
      <span class="ms-row-date ${dateClass}">${dateLabel}</span>
      <span class="ms-row-count">${done}/${total}</span>
      <div class="ms-row-pct-wrap">
        <div class="ms-row-pct-bar">
          <div class="ms-row-pct-fill" style="width:${pct}%;background:${pctColor}"></div>
        </div>
        <span class="ms-row-pct-num" style="color:${pctColor}">${pct}%</span>
      </div>
      <div class="ms-row-actions">
        <button class="ms-row-btn" onclick="event.stopPropagation();editMilestone(${m.id})">✎</button>
        <button class="ms-row-btn" onclick="event.stopPropagation();deleteMilestone(${m.id})" style="color:var(--text-3)" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-3)'">✕</button>
      </div>
    </div>`;

    // Expanded issues
    if (isExpanded) {
      const ts = getMilestoneTasks(m.id);
      const issueRows = ts.map(t => `
        <div class="milestone-issue-row" onclick="selectTask(${t.id})">
          <div class="milestone-issue-check ${t.done?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})"></div>
          <div class="milestone-issue-prio" style="background:${PM[t.priority].color}"></div>
          <span class="milestone-issue-text ${t.done?'done-text':''}">${esc(t.text)}</span>
          <span style="font-size:0.62rem;color:var(--text-3)">TSK-${String(t.id).padStart(3,'0')}</span>
        </div>`).join('');

      html += `<div class="milestone-detail">
        ${issueRows}
        <div class="milestone-add-issue">
          <div style="width:12px;height:12px;border:1.5px dashed var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--text-3);flex-shrink:0">+</div>
          <input placeholder="Add issue..." autocomplete="off"
            onkeydown="if(event.key==='Enter')addIssueToMilestone(${m.id},this)" />
        </div>
      </div>`;
    }
  });

  // Quick add new milestone
  html += `<div class="milestone-add-bar">
    <span style="color:var(--text-3);font-size:0.75rem">+</span>
    <input placeholder="New milestone..." autocomplete="off"
      onkeydown="if(event.key==='Enter'&&this.value.trim()){quickAddMilestone(this.value.trim());this.value='';}" />
  </div>`;

  el.innerHTML = html;
}

function toggleMilestoneExpand(id) {
  milestoneExpanded[id] = !milestoneExpanded[id];
  _milestonesRenderHash = ''; // force re-render
  renderMilestones();
}

function addIssueToMilestone(mid, input) {
  const text = input.value.trim();
  if (!text) return;
  tasks.unshift({ id: counter++, text, priority: 'p4', done: false, day: null, inbox: false, milestone: mid });
  save(); renderMilestones(); renderList(); updateTriageBadge();
  // refocus input
  setTimeout(() => {
    const inputs = document.querySelectorAll('.milestone-add-issue input');
    inputs.forEach(inp => { if (inp.closest('[data-mid]') || true) inp.focus(); });
  }, 50);
}

function quickAddMilestone(name) {
  milestones.push({ id: milestoneCounter++, name, color: '#5E6AD2', due: null });
  saveMilestones(); renderMilestones();
}

function msDragStart(e, idx) { milestoneDragSrc = idx; e.dataTransfer.effectAllowed = 'move'; }
function msDragOver(e, idx) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function msDrop(e, idx) {
  e.preventDefault();
  if (milestoneDragSrc === null || milestoneDragSrc === idx) return;
  const moved = milestones.splice(milestoneDragSrc, 1)[0];
  milestones.splice(idx, 0, moved);
  milestoneDragSrc = null;
  saveMilestones(); renderMilestones();
}
function msDragEnd() { milestoneDragSrc = null; }

function deleteMilestone(id) {
  milestones = milestones.filter(m => m.id !== id);
  // unlink tasks
  tasks.forEach(t => { if (t.milestone === id) delete t.milestone; });
  save(); saveMilestones(); renderMilestones(); renderList();
}

function editMilestone(id) { openMilestoneModal(id); }

// ── MILESTONE MODAL ──
function openMilestoneModal(editId) {
  milestoneModalEditId = editId || null;
  milestoneColor = '#5E6AD2';
  if (editId) {
    const m = milestones.find(m => m.id === editId);
    if (!m) return;
    document.getElementById('milestone-name-input').value = m.name;
    document.getElementById('milestone-date-input').value = m.due || '';
    milestoneColor = m.color;
    document.getElementById('milestone-modal-title').textContent = 'Edit milestone';
    document.getElementById('milestone-modal-save').textContent = 'Save';
  } else {
    document.getElementById('milestone-name-input').value = '';
    document.getElementById('milestone-date-input').value = '';
    document.getElementById('milestone-modal-title').textContent = 'New milestone';
    document.getElementById('milestone-modal-save').textContent = 'Create';
  }
  document.querySelectorAll('#milestone-color-picker .color-swatch').forEach(s => {
    s.style.border = s.dataset.c === milestoneColor ? '2px solid white' : '2px solid transparent';
  });
  document.getElementById('milestone-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('milestone-name-input').focus(), 50);
}

function closeMilestoneModal() { document.getElementById('milestone-modal').style.display = 'none'; }

function selectMilestoneColor(c) {
  milestoneColor = c;
  document.querySelectorAll('#milestone-color-picker .color-swatch').forEach(s => {
    s.style.border = s.dataset.c === c ? '2px solid white' : '2px solid transparent';
  });
}

function saveMilestoneModal() {
  const name = document.getElementById('milestone-name-input').value.trim();
  if (!name) { document.getElementById('milestone-name-input').focus(); return; }
  const due = document.getElementById('milestone-date-input').value || null;
  if (milestoneModalEditId) {
    const m = milestones.find(m => m.id === milestoneModalEditId);
    if (m) { m.name = name; m.color = milestoneColor; m.due = due; }
  } else {
    milestones.push({ id: milestoneCounter++, name, color: milestoneColor, due });
  }
  saveMilestones(); closeMilestoneModal(); renderMilestones();
}

document.addEventListener('DOMContentLoaded', () => {
  const mni = document.getElementById('milestone-name-input');
  if (mni) mni.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveMilestoneModal();
    if (e.key === 'Escape') closeMilestoneModal();
  });
});

// Each view has its own filter state
const viewFilters = {
  list:       { status: null, milestone: null, priority: null },
  week:       { status: null, milestone: null, priority: null },
  triage:     { status: null, milestone: null, priority: null },
  milestones: { status: null, milestone: null, priority: null },
  habits:     { status: null, milestone: null, priority: null },
};

function getActiveFilters() {
  const vf = viewFilters[currentView];
  if (!vf) return {};
  return vf;
}

function setViewFilter(type, value, label, icon) {
  // Close dropdown
  closeAllFilterDDs();

  const vf = viewFilters[currentView];
  if (!vf) return;
  vf[type] = value || null;

  // Update chip UI
  const btn = document.getElementById('filter-' + type + '-btn');
  const lbl = document.getElementById('filter-' + type + '-label');
  const caret = document.getElementById('filter-' + type + '-caret');
  const iconEl = document.getElementById('filter-' + type + '-icon');

  if (btn) btn.classList.toggle('active', !!value);
  if (lbl) lbl.textContent = value ? label : type.charAt(0).toUpperCase() + type.slice(1);
  if (iconEl && icon) iconEl.textContent = icon;
  if (caret) caret.textContent = value ? '✕' : '▾';

  // Show/hide clear button
  updateFilterClearBtn();

  renderAll();
}

function clearViewFilters() {
  const vf = viewFilters[currentView];
  if (!vf) return;
  vf.status = null; vf.milestone = null; vf.priority = null;

  ['status','milestone','priority'].forEach(type => {
    const btn = document.getElementById('filter-' + type + '-btn');
    const lbl = document.getElementById('filter-' + type + '-label');
    const caret = document.getElementById('filter-' + type + '-caret');
    if (btn) btn.classList.remove('active');
    if (lbl) lbl.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    if (caret) caret.textContent = '▾';
  });

  updateFilterClearBtn();
  renderAll();
}

function updateFilterClearBtn() {
  const vf = viewFilters[currentView];
  const hasActive = vf && (vf.status || vf.milestone || vf.priority);
  const btn = document.getElementById('filter-clear-btn');
  if (btn) btn.style.display = hasActive ? 'block' : 'none';
  const saveBtn = document.getElementById('save-view-btn');
  if (saveBtn) saveBtn.style.display = hasActive ? 'block' : 'none';
}

function toggleFilterDD(type) {
  const dd = document.getElementById('filter-' + type + '-dd');
  if (!dd) return;

  // If clicking active filter chip caret (has value), clear instead
  const vf = viewFilters[currentView];
  if (vf && vf[type]) {
    setViewFilter(type, null, '', '');
    return;
  }

  const isOpen = dd.style.display !== 'none';
  closeAllFilterDDs();
  if (!isOpen) {
    // Populate milestone options dynamically
    if (type === 'milestone') populateMilestoneFilterOptions();
    dd.style.display = 'block';
  }
}

function closeAllFilterDDs() {
  document.querySelectorAll('.filter-dropdown').forEach(d => d.style.display = 'none');
}

function populateMilestoneFilterOptions() {
  const container = document.getElementById('filter-milestone-options');
  if (!container) return;
  const vf = viewFilters[currentView];
  container.innerHTML = milestones.map(m => `
    <div class="filter-option ${vf?.milestone===m.id?'selected':''}"
      onclick="setViewFilter('milestone',${m.id},'${esc(m.name)}','◈')">
      <div class="filter-option-dot" style="background:${m.color}"></div>
      ${esc(m.name)}
      ${vf?.milestone===m.id ? '<span class="filter-option-check">✓</span>' : ''}
    </div>`).join('') || '<div class="filter-option" style="color:var(--text-3)">No milestones</div>';
}

function applyFilters(taskList) {
  const vf = getActiveFilters();
  return taskList.filter(t => {
    if (vf.status === 'todo' && t.done) return false;
    if (vf.status === 'done' && !t.done) return false;
    if (vf.milestone && t.milestone !== vf.milestone) return false;
    if (vf.priority && t.priority !== vf.priority) return false;
    return true;
  });
}

function updateFilterBarVisibility() {
  const fb = document.getElementById('filter-bar');
  if (!fb) return;
  const show = currentView === 'list' || currentView === 'week';
  fb.style.display = show ? 'flex' : 'none';
  if (show) {
    // Restore chip states for this view
    const vf = viewFilters[currentView] || {};
    ['status','milestone','priority'].forEach(type => {
      const btn = document.getElementById('filter-' + type + '-btn');
      if (btn) btn.classList.toggle('active', !!vf[type]);
    });
    updateFilterClearBtn();
  }
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('[id^="filter-"]') && !e.target.closest('.filter-dropdown')) {
    closeAllFilterDDs();
  }
});


// ── SAVED VIEWS ──
// savedViews declared at top

function saveSavedViews() {
  localStorage.setItem('saved_views_v1', JSON.stringify(savedViews));
}

function loadSavedViewById(id) {
  const sv = savedViews.find(v => v.id === id);
  if (!sv) return;
  // Ensure viewFilters entry exists for this view, then apply
  if (!viewFilters[sv.view]) viewFilters[sv.view] = { status: null, milestone: null, priority: null };
  if (sv.filters) Object.assign(viewFilters[sv.view], sv.filters);
  // Switch view AFTER filters are set so render picks them up immediately
  switchView(sv.view);
  // Sync chip UI
  ['status','milestone','priority'].forEach(type => {
    const val = sv.filters?.[type];
    const btn = document.getElementById('filter-' + type + '-btn');
    const lbl = document.getElementById('filter-' + type + '-label');
    const caret = document.getElementById('filter-' + type + '-caret');
    if (btn) btn.classList.toggle('active', !!val);
    if (lbl) lbl.textContent = val
      ? (type==='status' ? (val==='todo'?'Todo':'Done')
        : type==='priority' ? {p1:'Urgent',p2:'High',p3:'Medium',p4:'Low'}[val]
        : (milestones.find(m=>m.id===val)?.name || val))
      : type.charAt(0).toUpperCase()+type.slice(1);
    if (caret) caret.textContent = val ? '✕' : '▾';
  });
  updateFilterClearBtn();
  renderAll();
}

function saveCurrentView(name) {
  if (!name.trim()) return;
  const vf = JSON.parse(JSON.stringify(viewFilters[currentView] || {}));
  const existing = savedViews.findIndex(v => v.name === name.trim());
  const entry = { name: name.trim(), view: currentView, filters: vf, id: Date.now() };
  if (existing >= 0) savedViews[existing] = entry;
  else savedViews.push(entry);
  saveSavedViews();
  renderSavedViews();
}

function loadSavedViewById(id) {
  const sv = savedViews.find(v => v.id === id);
  if (sv) loadSavedView(sv);
}

function loadSavedView(idx) {
  const sv = savedViews[idx];
  if (!sv) return;
  // Restore view + filters
  {
    Object.assign(viewFilters[sv.view] || {}, sv.filters || {});
    switchView(sv.view);
    // Sync chip UI
    ['status','milestone','priority'].forEach(type => {
      const val = sv.filters?.[type];
      const btn = document.getElementById('filter-' + type + '-btn');
      const lbl = document.getElementById('filter-' + type + '-label');
      const caret = document.getElementById('filter-' + type + '-caret');
      if (btn) btn.classList.toggle('active', !!val);
      if (lbl && val) {
        if (type === 'status') lbl.textContent = val === 'todo' ? 'Todo' : 'Done';
        else if (type === 'priority') lbl.textContent = { p1:'Urgent',p2:'High',p3:'Medium',p4:'Low' }[val] || val;
        else if (type === 'milestone') {
          const m = milestones.find(m => m.id === val);
          if (m) lbl.textContent = m.name;
        }
      } else if (lbl) {
        lbl.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      }
      if (caret) caret.textContent = val ? '✕' : '▾';
    });
    updateFilterClearBtn();
  }
}

function deleteSavedView(id) {
  savedViews = savedViews.filter(v => v.id !== id);
  saveSavedViews();
  renderSavedViews();
}

function renderSavedViews() {
  const container = document.getElementById('saved-views-list');
  if (!container) return;
  if (!savedViews.length) {
    container.innerHTML = '';
    return;
  }
  const VIEW_ICONS = { list:'≡', week:'◫', triage:'⊡', milestones:'◈', habits:'◉' };
  const header = '<div class="nav-label">Views</div>';
  const rows = savedViews.map(sv => {
    const icon = VIEW_ICONS[sv.view] || '≡';
    const nameSpan = '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(sv.name) + '</span>';
    const loadBtn = '<button class="nav-item" style="flex:1;gap:6px" onclick="loadSavedViewById(' + sv.id + ')">' +
      '<span style="opacity:0.6">' + icon + '</span>' + nameSpan + '</button>';
    const delBtn = '<button class="saved-view-del" data-id="' + sv.id + '">✕</button>';
    return '<div style="display:flex;align-items:center;gap:0;width:100%">' + loadBtn + delBtn + '</div>';
  }).join('');
  container.innerHTML = header + rows;
  // Attach delete handlers
  container.querySelectorAll('.saved-view-del').forEach(btn => {
    btn.addEventListener('click', () => deleteSavedView(parseInt(btn.dataset.id)));
  });
}

function promptSaveView() {
  const name = window.prompt('Name this view:', '');
  if (name) saveCurrentView(name);
}
