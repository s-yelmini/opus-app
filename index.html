// ── HABITS YEAR VIEW ──
// ════════════════════════════════════════

function getYearDays(yearOffset) {
  const year = new Date(today()).getFullYear() + yearOffset;
  const days = [];
  for (let m = 0; m < 12; m++) {
    const monthDays = [];
    const d = new Date(year, m, 1);
    while (d.getMonth() === m) { monthDays.push(new Date(d)); d.setDate(d.getDate()+1); }
    days.push(monthDays);
  }
  return days; // array of 12 arrays
}

function getHeatColor(baseColor, pct) {
  // Returns a color from near-transparent to full baseColor based on 0-100 pct
  if (pct === 0) return 'var(--surface3)';
  // Parse hex color to rgb
  const hex = baseColor.replace('#','');
  const r = parseInt(hex.slice(0,2),16);
  const g = parseInt(hex.slice(2,4),16);
  const b = parseInt(hex.slice(4,6),16);
  // Map pct to alpha: 0%→0.08, 25%→0.25, 50%→0.5, 75%→0.75, 100%→1.0
  const alpha = 0.08 + (pct/100) * 0.92;
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

function getMonthPct(habitId, monthDays, freq) {
  const todayD = today();
  const elapsed = monthDays.filter(d => d <= todayD);
  if (!elapsed.length) return -1; // future month
  const logged = elapsed.filter(d => isLogged(habitId, toKey(d))).length;
  const weeksElapsed = Math.max(1, elapsed.length / 7);
  const target = Math.min(monthDays.length, Math.round(weeksElapsed * freq));
  return target > 0 ? Math.min(100, Math.round((logged / target) * 100)) : 0;
}

function renderHabitsYear() {
  const container = document.getElementById('habits-content');
  if (!container) return;

  const activeHabits = habits.filter(h => !h.paused);
  if (!activeHabits.length) {
    container.innerHTML = `<div style="padding:48px 20px;text-align:center;font-size:0.75rem;color:var(--text-3)">
      No habits yet.<br><br>
      <button class="habit-add-btn" style="margin:0 auto;justify-content:center" onclick="openHabitModal()">+ Add first habit</button>
    </div>`;
    return;
  }

  const year = new Date(today()).getFullYear() + habitOffset;
  const yearMonths = getYearDays(habitOffset);
  const todayD = today();

  let html = '<div class="year-heatmap-wrap">';

  activeHabits.forEach((h, hi) => {
    const freq = h.freq || 7;
    // Compute yearly stats
    const allDays = yearMonths.flat();
    const elapsed = allDays.filter(d => d <= todayD && d.getFullYear() === year);
    const logged = elapsed.filter(d => isLogged(h.id, toKey(d))).length;
    const weeksElapsed = Math.max(1, elapsed.length / 7);
    const targetYear = Math.round(weeksElapsed * freq);
    const yearPct = targetYear > 0 ? Math.min(100, Math.round((logged / targetYear) * 100)) : 0;
    const streak = getStreak(h.id);
    const pctColor = yearPct >= 80 ? 'var(--green)' : yearPct >= 50 ? 'var(--yellow)' : yearPct > 0 ? 'var(--orange)' : 'var(--text-3)';

    html += `<div class="year-habit-block">
      <div class="year-habit-header">
        <div style="width:3px;height:16px;border-radius:2px;background:${h.color};flex-shrink:0"></div>
        <span class="year-habit-name">${esc(h.name)}</span>
        <span style="font-size:0.62rem;color:var(--text-3)">${freq}/wk</span>
        <div class="year-habit-stats">
          <div class="year-stat">
            <span class="year-stat-val" style="color:${pctColor}">${yearPct}%</span>
            completion
          </div>
          <div class="year-stat">
            <span class="year-stat-val">${logged}</span>
            days done
          </div>
          ${streak > 0 ? `<div class="year-stat">
            <span class="year-stat-val" style="color:var(--orange)">🔥 ${streak}</span>
            streak
          </div>` : ''}
          <button style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.7rem;padding:2px 5px" onclick="editHabit(${h.id})">✎</button>
        </div>
      </div>
      <div class="year-months-row" id="year-months-${h.id}">
        ${yearMonths.map((monthDays, mi) => {
          const monthPct = getMonthPct(h.id, monthDays, freq);
          const isFuture = monthPct === -1;
          const bgColor = isFuture ? 'var(--surface3)' : getHeatColor(h.color, monthPct);
          const monthName = MONTHS[mi].slice(0,3);

          // Build week rows for this month (for tooltip detail)
          // Group days by week
          const firstDow = monthDays[0].getDay() === 0 ? 6 : monthDays[0].getDay() - 1;
          const paddedDays = [...Array(firstDow).fill(null), ...monthDays];
          const weeks = [];
          for (let i = 0; i < paddedDays.length; i += 7) {
            weeks.push(paddedDays.slice(i, i+7));
          }

          return `<div class="year-month-col">
            <div class="year-month-label">${monthName}</div>
            <div class="month-heat-grid">
              ${weeks.map(week => `<div class="month-heat-row">
                ${week.map(d => {
                  if (!d) return '<div style="width:10px;height:10px;flex-shrink:0"></div>';
                  const k = toKey(d);
                  const done = isLogged(h.id, k);
                  const fut = d > todayD;
                  const isToday = k === toKey(todayD);
                  const cellColor = done ? h.color : fut ? 'rgba(255,255,255,0.03)' : 'var(--surface3)';
                  const border = isToday ? `outline:1px solid ${h.color};outline-offset:1px;` : '';
                  return `<div class="heat-cell"
                    style="background:${cellColor};${border}${fut?'opacity:0.3;cursor:default;':''}"
                    title="${DAY_NAMES[d.getDay()===0?6:d.getDay()-1]} ${d.getDate()} ${MONTHS[d.getMonth()]}${done?' ✓':''}"
                    onclick="${fut?'':''}"
                  ></div>`;
                }).join('')}
              </div>`).join('')}
            </div>
            <div style="margin-top:4px;height:3px;border-radius:2px;background:${bgColor};opacity:${isFuture?'0.2':'1'}"></div>
            ${!isFuture ? `<div style="text-align:center;font-size:0.55rem;color:var(--text-3);margin-top:2px">${monthPct}%</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      <div class="heat-legend" style="margin-top:8px">
        <span class="heat-legend-label">Less</span>
        <div class="heat-legend-cells">
          ${[0,25,50,75,100].map(p => `<div style="width:10px;height:10px;border-radius:2px;background:${getHeatColor(h.color,p)}"></div>`).join('')}
        </div>
        <span class="heat-legend-label">More</span>
      </div>
    </div>`;

    if (hi < activeHabits.length - 1) html += '<div class="year-habit-sep"></div>';
  });

  html += `<button class="habit-add-btn" style="margin-top:8px" onclick="openHabitModal()">+ Add habit</button>`;
  html += '</div>';
  container.innerHTML = html;
}

const AI_ENDPOINT='/api/claude';
async function callClaude(action,payload){const res=await fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...payload})});if(!res.ok)throw new Error('API '+res.status);const data=await res.json();if(!data.ok)throw new Error(data.error||'err');return data.result;}
let triageGenSuggestions=[];
let _activeToast=null;
function showToast(msg,undoFn){if(_activeToast)_activeToast.remove();const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:10px 18px;font-family:"Geist Mono",monospace;font-size:0.72rem;color:var(--text-2);display:flex;align-items:center;gap:12px;z-index:999;box-shadow:0 8px 28px rgba(0,0,0,0.5)';t.innerHTML=msg;if(undoFn){const b=document.createElement('button');b.textContent='Deshacer';b.style.cssText='border:1px solid var(--border2);background:none;color:var(--accent);border-radius:var(--radius);padding:3px 10px;cursor:pointer;font-family:"Geist Mono",monospace;font-size:0.68rem';b.onclick=()=>{undoFn();t.remove();_activeToast=null;};t.appendChild(b);}document.body.appendChild(t);_activeToast=t;setTimeout(()=>{if(t.parentNode){t.remove();if(_activeToast===t)_activeToast=null;}},4500);}
function toggleGeneratePanel(open){const p=document.getElementById('triage-generate-panel');if(!p)return;p.style.display=open?'flex':'none';if(open){const ta=document.getElementById('triage-plan-input');if(ta){ta.value='';setTimeout(()=>ta.focus(),60);}const gr=document.getElementById('triage-gen-results');if(gr)gr.style.display='none';triageGenSuggestions=[];}}
async function runGeneratePlan(){const ta=document.getElementById('triage-plan-input');const text=ta?ta.value.trim():'';if(!text){if(ta)ta.focus();return;}const btn=document.getElementById('triage-gen-btn');const rw=document.getElementById('triage-gen-results');const ct=document.getElementById('triage-gen-content');if(btn){btn.style.opacity='0.6';btn.style.pointerEvents='none';btn.innerHTML='<span>&#10022;</span> Generando...';}if(rw)rw.style.display='block';if(ct)ct.innerHTML='<div style="font-size:0.72rem;color:var(--text-3);padding:4px 0">Procesando...</div>';try{const wk=getWeekDays(0).map((d,i)=>({label:DAY_NAMES[i],date:toKey(d)}));const result=await callClaude('plan',{input:text,weekDays:wk,milestones:milestones.map(m=>({id:m.id,name:m.name}))});const suggestions=Array.isArray(result)?result:[];const startId=counter;suggestions.forEach(s=>{addTask(s.title,s.priority||'p4',null,true);if(s.milestone_id){const t2=tasks[0];if(t2)t2.milestone=s.milestone_id;}});const addedIds=suggestions.map((_,i)=>startId+i);if(suggestions.length){save();updateTriageBadge();renderTriage();}if(ta)ta.value='';if(ct){ct.innerHTML=suggestions.length?'<div style="font-size:0.72rem;color:var(--green)">&#10003; '+suggestions.length+' issue'+(suggestions.length!==1?'s':'')+' añadido'+(suggestions.length!==1?'s':'')+' al triage</div>':'<div style="font-size:0.72rem;color:var(--text-3)">Sin sugerencias.</div>';}if(suggestions.length){showToast('✓ '+suggestions.length+' issue'+(suggestions.length!==1?'s':'')+' añadido'+(suggestions.length!==1?'s':'')+' al triage',()=>{addedIds.forEach(id=>{const idx=tasks.findIndex(t=>t.id===id);if(idx!==-1)tasks.splice(idx,1);});save();updateTriageBadge();renderTriage();});}setTimeout(()=>{if(rw)rw.style.display='none';if(ta)ta.focus();},2200);}catch(e){if(ct)ct.innerHTML='<div style="font-size:0.72rem;color:var(--red)">Error: '+e.message+'</div>';}finally{if(btn){btn.style.opacity='';btn.style.pointerEvents='';btn.innerHTML='<span>&#10022;</span> Generar issues';}}}
function renderTriageGenResults(){const ct=document.getElementById('triage-gen-content');if(!ct)return;if(!triageGenSuggestions.length){ct.innerHTML='<div style="font-size:0.72rem;color:var(--text-3)">Sin sugerencias.</div>';return;}const PL={p1:'Urgent',p2:'High',p3:'Medium',p4:'Low'},PC={p1:'var(--red)',p2:'var(--orange)',p3:'var(--yellow)',p4:'var(--text-3)'};let html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:0.68rem;color:var(--text-3)">'+triageGenSuggestions.length+' sugerencias</span><button onclick="acceptAllGenSuggestions()" class="plan-accept-all-btn">Aceptar todas</button></div>';triageGenSuggestions.forEach((s,i)=>{const ms=milestones.find(m=>m.id===s.milestone_id),pc=PC[s.priority]||'var(--text-3)';html+='<div class="plan-issue-card" id="gen-card-'+i+'"><div class="plan-issue-title">'+esc(s.title)+'</div><div class="plan-issue-meta"><span class="plan-meta-chip active" style="border-color:'+pc+';color:'+pc+'"><span style="width:6px;height:6px;border-radius:1px;background:'+pc+';display:inline-block"></span> '+(PL[s.priority]||'Low')+'</span>'+(ms?'<span class="plan-meta-chip active">&#9672; '+esc(ms.name)+'</span>':'')+'</div>'+(s.reasoning?'<div class="plan-issue-reasoning">"'+esc(s.reasoning)+'"</div>':'')+'<div class="plan-issue-actions"><button class="plan-accept-btn" onclick="acceptGenSuggestion('+i+')">&#10003; Aceptar</button><button class="plan-dismiss-btn" onclick="dismissGenSuggestion('+i+')">&#10005; Descartar</button></div></div>';});ct.innerHTML=html;}
function acceptGenSuggestion(idx){const s=triageGenSuggestions[idx];if(!s)return;addTask(s.title,s.priority||'p4',null,true);if(s.milestone_id){const t2=tasks[0];if(t2){t2.milestone=s.milestone_id;save();}}triageGenSuggestions.splice(idx,1);const card=document.getElementById('gen-card-'+idx);if(card){card.style.transition='all 0.18s';card.style.opacity='0';card.style.transform='translateX(10px)';}setTimeout(()=>renderTriageGenResults(),200);updateTriageBadge();}
function dismissGenSuggestion(idx){triageGenSuggestions.splice(idx,1);const card=document.getElementById('gen-card-'+idx);if(card){card.style.transition='all 0.15s';card.style.opacity='0';card.style.transform='translateX(-8px)';}setTimeout(()=>renderTriageGenResults(),160);}
function acceptAllGenSuggestions(){triageGenSuggestions.forEach(s=>{addTask(s.title,s.priority||'p4',null,true);if(s.milestone_id){const t2=tasks[0];if(t2)t2.milestone=s.milestone_id;}});save();triageGenSuggestions=[];updateTriageBadge();renderTriage();toggleGeneratePanel(false);const gr=document.getElementById('triage-gen-results');if(gr)gr.style.display='none';}
function smartAdd(rawText){if(!rawText.trim())return;addTask(rawText,'p4',null,false);}
function expandNotes(taskId){}
let ctxMenu=null;
function showContextMenu(e,taskId){e.preventDefault();hideContextMenu();const t=tasks.find(t=>t.id===taskId);if(!t)return;const tk=toKey(today());const menu=document.createElement('div');menu.id='ctx-menu';menu.style.cssText='position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:4px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,0.45);backdrop-filter:blur(12px);font-family:"Geist Mono",monospace;left:'+Math.min(e.clientX,window.innerWidth-180)+'px;top:'+Math.min(e.clientY,window.innerHeight-160)+'px;';[{label:t.done?'&#9675; Todo':'&#10003; Done',fn:()=>toggleDone(taskId)},{label:t.day===tk?'&#8212; Clear':'Today',fn:()=>updateTask(taskId,{day:t.day===tk?null:tk})},{sep:true},{label:'&#10005; Delete',fn:()=>deleteTask(taskId),danger:true}].forEach(item=>{if(item.sep){const hr=document.createElement('div');hr.style.cssText='height:1px;background:var(--border);margin:3px 0';menu.appendChild(hr);return;}const btn=document.createElement('button');btn.style.cssText='display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;border-radius:3px;cursor:pointer;font-size:0.72rem;font-family:"Geist Mono",monospace;color:'+(item.danger?'var(--red)':'var(--text-2)')+';transition:background 0.08s';btn.innerHTML=item.label;btn.onmouseover=()=>btn.style.background='var(--surface3)';btn.onmouseout=()=>btn.style.background='none';btn.onclick=()=>{item.fn();hideContextMenu();};menu.appendChild(btn);});document.body.appendChild(menu);ctxMenu=menu;setTimeout(()=>document.addEventListener('click',hideContextMenu,{once:true}),10);}
function hideContextMenu(){ctxMenu?.remove();ctxMenu=null;}
function getTodayDot(t){return t.day===toKey(today())&&!t.done?'<span style="width:5px;height:5px;border-radius:50%;background:var(--accent);display:inline-block;margin-left:6px;flex-shrink:0;vertical-align:middle"></span>':'';}
document.addEventListener('keydown',e=>{if(e.key!=='Tab'||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(document.getElementById('modal')?.style.display!=='none')return;e.preventDefault();const views=['triage','list','week','milestones','habits'];const next=views[(views.indexOf(currentView)+1)%views.length];switchView(next);syncSidebarNav(next);});
function updateSidebarHabitsWidget() {
  const el = document.getElementById('sidebar-habits-widget');
  if (!el) return;
  const todayKey = toKey(today());
  const active = habits.filter(h => !h.paused).slice(0, 6);
  if (!active.length) {
    el.innerHTML = '<div style="padding:2px 0;font-size:0.65rem;color:var(--text-3);font-style:italic">No habits</div>';
    return;
  }
  const doneCount = active.filter(h => isLogged(h.id, todayKey)).length;
  el.innerHTML = '<div style="padding:4px 0 2px">'
    + active.map(h => {
        const done = isLogged(h.id, todayKey);
        return '<div style="display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;border-radius:4px" '
          + 'onclick="toggleHabitLog(' + h.id + ',\'' + todayKey + '\')">'
          + '<div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all 0.15s;'
          + (done
              ? 'background:' + h.color + ';box-shadow:0 0 5px ' + h.color + '55'
              : 'border:1.5px solid var(--border2)')
          + '"></div>'
          + '<span style="font-size:0.68rem;color:' + (done ? 'var(--text-2)' : 'var(--text-3)') + ';line-height:1.3">'
          + esc(h.name) + '</span>'
          + '</div>';
      }).join('')
    + '<div style="font-size:0.59rem;color:var(--text-3);margin-top:5px;padding-top:4px;border-top:1px solid var(--border)">'
    + doneCount + '/' + active.length + ' today</div>'
    + '</div>';
}

function renderAll() {
  updateSidebarHabitsWidget();
  switch (currentView) {
    case 'week':       renderWeek(); break;
    case 'list':       renderList(); break;
    case 'habits':     renderHabits(); break;
    case 'milestones': renderMilestones(); break;
    case 'triage':     renderTriage(); break;
  }
  updateBadges();
  updateTriageBadge();
  if (selectedId && currentView !== 'habits' && currentView !== 'milestones') renderDetail();
}

let _badgeCache = {};
function updateBadges() {
  const nonInbox = tasks.filter(t => !t.inbox);
  const vals = {
    all:    nonInbox.filter(t => !t.done).length,
    ms:     milestones.filter(m => getMilestoneProgress(m.id).pct < 100).length,
    triage: getInboxTasks().length,
  };
  const set = (id, v) => { const el = document.getElementById(id); if (el && el.textContent != v) el.textContent = v; };
  const tog = (id, on) => { const el = document.getElementById(id); if (el) el.classList.toggle('visible', on); };
  set('badge-all',        vals.all);
  set('badge-milestones', vals.ms);
  set('badge-triage',     vals.triage);
  set('badge-triage-nav', vals.triage);
  tog('triage-dot-sidebar', vals.triage > 0);
  const gb = document.getElementById('gen-issues-btn');
  if (gb) gb.innerHTML = vals.triage > 0
    ? '&#10022; Generar issues <span style="opacity:0.7;font-size:0.62rem">('+vals.triage+')</span>'
    : '&#10022; Generar issues';
  _badgeCache = vals;
}


// ── INIT ──
renderSavedViews();
switchView('week');
updateBadges();
updateTriageBadge();
setTimeout(updateSidebarHabitsWidget, 100);
