  const mm = g('mood-med-notes');   if (mm) moodDraft.medicationNotes = mm.value;
  const sl = g('mood-sleep-label'); if (sl && sh) sl.textContent = parseFloat(sh.value).toFixed(1)+'h';
}

function moodSetField(field, value) {
  if (!moodDraft) initMoodDraft();
  captureTextDraft();
  moodDraft[field] = value;
  const c = document.getElementById('mood-content');
  if (!c) return;
  const sc = c.scrollTop;
  c.innerHTML = moodSubView==='checkin' ? renderMoodCheckin() : renderMoodTrends();
  c.scrollTop = sc;
}

function moodToggle(field) { moodSetField(field, !moodDraft[field]); }

function updateMoodSeg() {
  ['checkin','trends'].forEach(v => {
    const btn = document.getElementById('mood-seg-'+v);
    if (!btn) return;
    const on = v === moodSubView;
    btn.style.background = on ? 'var(--bg-elev)' : 'transparent';
    btn.style.color = on ? 'var(--ink)' : 'var(--ink-3)';
    btn.style.fontWeight = on ? '600' : '500';
    btn.style.boxShadow = on ? '0 1px 2px rgba(0,0,0,0.04)' : 'none';
  });
}

function setMoodSubView(v) {
  moodSubView = v;
  updateMoodSeg();
  const c = document.getElementById('mood-content');
  if (!c) return;
  c.innerHTML = v==='checkin' ? renderMoodCheckin() : renderMoodTrends();
}

function saveMoodCheckin() {
  if (!moodDraft) return;
  captureTextDraft();
  if (moodDraft.moodScore === null) {
    const s = document.getElementById('mood-score-section');
    if (s) { s.style.outline='2px solid var(--accent)'; setTimeout(()=>s.style.outline='',1600); }
    return;
  }
  const key = moodCheckinDate||toKey(today()), now = new Date().toISOString();
  moodEntries[key] = {...moodDraft, date:key, createdAt:moodEntries[key]?.createdAt||now, updatedAt:now};
  saveMoodData();
  const c = document.getElementById('mood-content');
  if (c) c.innerHTML = renderMoodCheckin();
}

function shiftMoodDay(delta) {
  captureTextDraft();
  const d = new Date((moodCheckinDate||toKey(today()))+'T00:00:00');
  d.setDate(d.getDate()+delta);
  const newKey = toKey(d);
  if (newKey > toKey(today())) return;
  moodCheckinDate = newKey;
  initMoodDraft();
  const c = document.getElementById('mood-content');
  if (c) c.innerHTML = renderMoodCheckin();
}

function goMoodToday() {
  captureTextDraft();
  moodCheckinDate = toKey(today());
  initMoodDraft();
  const c = document.getElementById('mood-content');
  if (c) c.innerHTML = renderMoodCheckin();
}

// ── NumScale helper ──
function numScaleSVG(field, value, count=5, start=1) {
  let html = '<div style="display:flex;gap:4px">';
  for (let n=start; n<=start+count-1; n++) {
    const on = value === n;
    html += `<button onclick="moodSetField('${field}',${n})" style="flex:1;height:32px;background:${on?'var(--bg-active)':'var(--bg-elev)'};border:1px solid ${on?'var(--line-strong)':'var(--line)'};border-radius:var(--radius);color:${on?'var(--ink)':'var(--ink-2)'};font-size:12.5px;font-weight:${on?600:500};cursor:pointer;font-family:inherit;font-variant-numeric:tabular-nums">${n}</button>`;
  }
  return html + '</div>';
}

// ── Trend charts ──
function moodFocusChartSVG(data, color, range) {
  const W=1000, H=140, [lo,hi]=range;
  const pts = data.map((v,i) => [i*(W/(data.length-1)), H-((v-lo)/(hi-lo))*H]);
  const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const fill = path+` L ${W} ${H} L 0 ${H} Z`;
  const last = pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">
    <defs><linearGradient id="mfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.10"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <line x1="0" y1="${H-0.5}" x2="${W}" y2="${H-0.5}" stroke="var(--line)" stroke-width="1" vector-effect="non-scaling-stroke"/>
    <path d="${fill}" fill="url(#mfill)"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${color}"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="6.5" fill="${color}" opacity="0.18"/>
  </svg>`;
}

function moodSparklineSVG(data, color, range, h=22) {
  const W=100, [lo,hi]=range;
  const path = data.map((v,i)=>{
    const x=i*(W/(data.length-1));
    const y=h-((v-lo)/(hi-lo))*h*0.85-h*0.075;
    return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block"><path d="${path}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>`;
}

function moodGenSeries(key) {
  const v = MOOD_VARS.find(x=>x.key===key);
  const [lo,hi] = v.range;
  const mid = (lo+hi)/2;
  let s = key.length*31;
  const rand = () => { s=(s*9301+49297)%233280; return s/233280; };
  return Array.from({length:60},(_,i)=>{
    const wave=Math.sin(i/7)*(hi-lo)*0.18;
    const drift=(i/60)*(hi-lo)*0.08;
    const noise=(rand()-0.5)*(hi-lo)*0.18;
    return Math.max(lo,Math.min(hi,mid+wave+drift+noise));
  });
}

  const TYPE_COLOR = { positive:'var(--accent)', warning:'oklch(0.62 0.10 60)', neutral:'var(--ink-4)' };

  if (moodTrendLoading) {
    html += `<div style="display:flex;align-items:center;gap:8px;color:var(--ink-3);font-size:12.5px"><span style="animation:pulse 1.2s ease infinite">✦</span> Analizando…</div>`;
  } else if (moodTrendAnalysis) {
    if (!moodTrendAnalysis.data_ok) {
      const n = moodTrendAnalysis.entries ?? 0;
      const err = moodTrendAnalysis.error;
      html += `<div style="font-size:12.5px;color:var(--ink-3);line-height:1.55">
        ${err ? `Error: ${esc(err)}` : `Necesitás al menos 5 check-ins para generar un análisis. Tenés <strong>${n}</strong> registrado${n===1?'':'s'}.`}
      </div>`;
    } else {
      const ins = moodTrendAnalysis.insights || [];
      if (!ins.length) {
        html += `<div style="font-size:12.5px;color:var(--ink-3)">No hay patrones claros en los datos de este período.</div>`;
      } else {
        html += `<div style="display:flex;flex-direction:column;gap:2px">`;
        ins.forEach(p => {
          const dot = TYPE_COLOR[p.type] || 'var(--ink-4)';
          html += `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)">
            <span style="width:7px;height:7px;border-radius:50%;background:${dot};margin-top:5px;flex-shrink:0"></span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px">${esc(p.title)}</div>
              <div style="font-size:12px;color:var(--ink-3);line-height:1.5">${esc(p.body)}</div>
            </div>
          </div>`;
        });
        html += `</div>`;
      }
    }
    html += `<button onclick="runMoodTrendAnalysis()" style="margin-top:12px;height:28px;padding:0 12px;border:1px solid var(--line);border-radius:var(--radius);background:none;color:var(--ink-3);font-size:12.5px;cursor:pointer;font-family:inherit">↻ Regenerar</button>`;
  } else {
    html += `<button onclick="runMoodTrendAnalysis()" style="height:28px;padding:0 12px;display:inline-flex;align-items:center;gap:6px;background:var(--accent);border:1px solid var(--accent);border-radius:var(--radius);color:white;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/></svg>
      Generar análisis
    </button>`;
  }
  html += '</div></section></div></div>';
  return html;
}

async function runMoodTrendAnalysis() {
  if (moodTrendLoading) return;
  const entries = getMoodSorted(21);
  if (entries.length < 5) {
    moodTrendAnalysis = { data_ok: false, entries: entries.length };
    renderMoodContent();
    return;
  }
  moodTrendLoading = true;
  renderMoodContent();
  try {
    const cutoff = entries[0]?.date || toKey(addDays(today(), -21));
    const habitCompliance = habits.filter(h=>!h.paused).map(h=>{
      const logged = Object.keys(habitLogs).filter(k=>k.startsWith(h.id+'_')&&habitLogs[k]).map(k=>k.split('_')[1]).filter(d=>d>=cutoff);
      return {nombre:h.name,frecuencia:`${h.freq}/semana`,diasCumplidos:logged.length,diasPeriodo:entries.length,cumplimiento:Math.round((logged.length/(entries.length||1))*100)+'%'};
    });
    const result = await callClaude('mood-trend', {entries, habits:habitCompliance});
    moodTrendAnalysis = (result && typeof result==='object' && 'data_ok' in result) ? result : { data_ok: false, entries: entries.length };
  } catch(err) {
    moodTrendAnalysis = { data_ok: false, error: err.message };
  } finally {
    moodTrendLoading = false;
    renderMoodContent();
  }
}

function renderMoodContent() {
  const c = document.getElementById('mood-content');
  if (!c) return;
  const sc = c.scrollTop;
  c.innerHTML = moodSubView==='checkin' ? renderMoodCheckin() : renderMoodTrends();
  c.scrollTop = sc;
}

function renderMood() {
  if (!moodDraft) initMoodDraft();
  renderMoodContent();
}

// ── INIT ──
renderSavedViews();
switchView('week');
updateBadges();
updateTriageBadge();
setTimeout(updateSidebarHabitsWidget, 100);
</script>
